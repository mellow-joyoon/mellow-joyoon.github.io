<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mellow Joyoon | 팬 관리 센터</title>
    <style>
        :root { --main-pink: #d63384; --soft-pink: #fdf2f4; --dark-pink: #c12a74; }
        body { 
            background-color: var(--soft-pink); font-family: 'Apple SD Gothic Neo', sans-serif; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;
        }
        .login-container { 
            background: white; padding: 40px 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center;
            box-shadow: 0 10px 30px rgba(214, 51, 132, 0.1); border: 1px solid rgba(214, 51, 132, 0.1);
        }
        h2 { color: var(--main-pink); margin-bottom: 25px; letter-spacing: -1px; }
        .auth-section { display: none; }
        .auth-section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input { 
            width: 100%; padding: 15px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 10px; 
            box-sizing: border-box; font-size: 16px; transition: 0.2s;
        }
        input:focus { border-color: var(--main-pink); outline: none; box-shadow: 0 0 0 3px rgba(214, 51, 132, 0.1); }
        button { 
            width: 100%; background: var(--main-pink); color: white; border: none; padding: 16px; 
            font-weight: bold; font-size: 16px; border-radius: 10px; cursor: pointer; transition: 0.2s;
        }
        button:active { background: var(--dark-pink); transform: scale(0.98); }
        .helper-links { margin-top: 20px; display: flex; justify-content: center; gap: 15px; font-size: 13px; color: #888; }
        .helper-links span { cursor: pointer; padding: 5px 10px; background: #f9f9f9; border-radius: 6px; }
        .signup-link { margin-top: 25px; padding-top: 20px; border-top: 1px dashed #eee; font-size: 14px; }
        .signup-link a { color: var(--main-pink); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="login-container">
        <div id="loginSection" class="auth-section active">
            <h2>팬 로그인</h2>
            <input type="email" id="email" placeholder="이메일 주소">
            <input type="password" id="password" placeholder="비밀번호">
            <button id="loginBtn">로그인하기</button>
            <div class="helper-links"><span onclick="showSection('resetSection')">비밀번호 찾기</span></div>
            <div class="signup-link">아직 회원이 아니신가요? <a href="signup.html">회원가입하기</a></div>
        </div>

        <div id="profileSection" class="auth-section">
            <h2>닉네임 설정</h2>
            <p style="font-size:13px; color:#666; margin-bottom:20px;">현재 닉네임: <span id="currentNicknameDisplay" style="color:var(--main-pink); font-weight:bold;">-</span></p>
            <input type="text" id="newNickname" placeholder="새로운 닉네임 입력">
            <button id="changeNickBtn">변경 내용 저장</button>
            <div class="helper-links"><span onclick="location.href='board.html'">게시판으로 돌아가기</span></div>
        </div>

        <div id="resetSection" class="auth-section">
            <h2>비밀번호 찾기</h2>
            <input type="email" id="resetEmail" placeholder="가입한 이메일">
            <button id="resetBtn">재설정 메일 보내기</button>
            <div class="helper-links"><span onclick="showSection('loginSection')">로그인으로 돌아가기</span></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, updateProfile, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCP4Ur--4UGGpNSK_P7qRvnVFDZbqn436A",
            authDomain: "mellow-joyoon.firebaseapp.com",
            projectId: "mellow-joyoon",
            storageBucket: "mellow-joyoon.firebasestorage.app",
            messagingSenderId: "556097417487",
            appId: "1:556097417487:web:0dca0eb26ba28d893c4e7a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.showSection = (id) => {
            document.querySelectorAll('.auth-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        // 엔터키 지원 함수
        const setupEnterKey = (inputId, btnId) => {
            document.getElementById(inputId).addEventListener("keypress", (e) => {
                if (e.key === "Enter") document.getElementById(btnId).click();
            });
        };
        setupEnterKey("password", "loginBtn");
        setupEnterKey("newNickname", "changeNickBtn");
        setupEnterKey("resetEmail", "resetBtn");

        // 로그인 로직
        document.getElementById("loginBtn").onclick = async () => {
            const email = document.getElementById("email").value.trim();
            const pw = document.getElementById("password").value;
            try {
                await signInWithEmailAndPassword(auth, email, pw);
                location.href = "board.html";
            } catch (e) { alert("로그인 실패: 정보를 확인해주세요."); }
        };

        // 닉네임 변경 로직
        document.getElementById("changeNickBtn").onclick = async () => {
            const name = document.getElementById("newNickname").value.trim();
            if (!name) return alert("닉네임을 입력하세요.");
            try {
                await updateProfile(auth.currentUser, { displayName: name });
                alert("성공적으로 변경되었습니다!");
                location.href = "board.html";
            } catch (e) { alert("변경 실패"); }
        };

        // 초기 모드 확인 (게시판에서 닉네임 클릭하고 왔을 때)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById("currentNicknameDisplay").innerText = user.displayName || "없음";
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('mode') === 'profile') showSection('profileSection');
            }
        });
    </script>
</body>
</html>
