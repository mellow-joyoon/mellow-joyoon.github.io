<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mellow Joyoon | 사진 수정하기</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;400;900&display=swap" rel="stylesheet">

    <style>
        /* ✅ 기존 스타일 유지 및 반응형 고도화 */
        body { 
            background-color: #f6f6f6; 
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif; 
            /* 아이폰 하단 홈바/노치 여백 대응 */
            padding: env(safe-area-inset-top) 15px calc(20px + env(safe-area-inset-bottom));
            color: #333; 
            margin: 0;
            -webkit-tap-highlight-color: transparent;
            -webkit-overflow-scrolling: touch;
            -webkit-text-size-adjust: none; /* 모바일 텍스트 자동크기조절 방지 */
        }
        
        .edit-container { 
            width: 100%;
            max-width: 850px; 
            margin: 20px auto; 
            background: white; 
            padding: clamp(15px, 4vw, 30px); 
            border: 1px solid #ddd; 
            box-sizing: border-box;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        
        h2 { 
            color: #d63384; 
            font-size: clamp(1.3rem, 5vw, 1.8rem); 
            border-bottom: 2px solid #333; 
            padding-bottom: 15px; 
            margin-bottom: 25px; 
            font-weight: 900;
            letter-spacing: -0.5px;
        }
        
        /* 📱 모바일 입력창 최적화 (16px 이상이어야 아이폰 사파리에서 확대 안 됨) */
        input[type="text"], textarea { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 15px; 
            border: 1px solid #ddd; 
            box-sizing: border-box; 
            font-size: 16px; 
            border-radius: 8px;
            transition: border-color 0.2s, background-color 0.2s;
            font-family: inherit;
        }
        input:focus, textarea:focus { border-color: #d63384; outline: none; background-color: #fffafc; }
        
        textarea { 
            height: clamp(250px, 45vh, 450px); 
            min-height: 250px;
            resize: none; 
            line-height: 1.6; 
        }

        /* 🔘 버튼 영역 반응형 디자인 */
        .btn-area { 
            display: flex; 
            justify-content: flex-end; 
            gap: 12px; 
            margin-top: 15px;
        }
        
        .btn { 
            flex: 1;
            max-width: 140px;
            padding: 14px 0; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 15px; 
            border-radius: 8px;
            text-align: center;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        
        .btn-submit { 
            background: #d63384; 
            color: white; 
            box-shadow: 0 4px 10px rgba(214, 51, 132, 0.2);
        }
        .btn-cancel { 
            background: #eee; 
            color: #555; 
        }
        
        .btn:active { transform: scale(0.96); opacity: 0.9; }

        /* 로딩 애니메이션 */
        #loading {
            text-align: center;
            padding: 80px 20px;
            font-size: 15px;
            color: #999;
        }

        /* 📱 모바일 전용 여백 조정 */
        @media (max-width: 768px) {
            .edit-container { margin: 10px auto; border-radius: 0; border-left: none; border-right: none; }
        }

        @media (max-width: 480px) {
            .btn-cancel, .btn-submit { max-width: none; }
            .btn-area { gap: 8px; }
            h2 { margin-bottom: 20px; }
        }
    </style>
</head>
<body>
    <div class="edit-container">
        <h2>사진 게시글 수정</h2>
        <div id="loading">✨ 기존 내용을 불러오는 중입니다...</div>
        
        <div id="edit-form" style="display:none;">
            <input type="text" id="editTitle" placeholder="제목을 입력하세요" autocomplete="off">
            <textarea id="editContent" placeholder="내용을 입력하세요"></textarea>
            
            <div class="btn-area">
                <a href="javascript:history.back();" class="btn btn-cancel">취소</a>
                <button class="btn btn-submit" id="updateBtn">수정 완료</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCP4Ur--4UGGpNSK_P7qRvnVFDZbqn436A",
            authDomain: "mellow-joyoon.firebaseapp.com",
            projectId: "mellow-joyoon",
            storageBucket: "mellow-joyoon.firebasestorage.app",
            messagingSenderId: "556097417487",
            appId: "1:556097417487:web:0dca0eb26ba28d893c4e7a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');
        const ADMIN_EMAIL = "yun786692@gmail.com"; 

        if (!postId) {
            alert("잘못된 접근입니다.");
            location.href = "photo-board.html";
        }

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                alert("로그인이 필요한 서비스입니다.");
                location.href = "login.html";
                return;
            }

            try {
                // 'photo_posts' 컬렉션 참조 유지
                const docRef = doc(db, "photo_posts", postId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    if (user.email === ADMIN_EMAIL || user.uid === data.authorId) {
                        document.getElementById("editTitle").value = data.title;
                        document.getElementById("editContent").value = data.content;
                        
                        document.getElementById("loading").style.display = "none";
                        document.getElementById("edit-form").style.display = "block";
                    } else {
                        alert("이 사진을 수정할 권한이 없습니다.");
                        location.href = "photo-board.html";
                    }
                } else {
                    alert("해당 사진 게시글이 존재하지 않습니다.");
                    location.href = "photo-board.html";
                }
            } catch (e) {
                console.error("데이터 로딩 중 오류:", e);
                alert("내용을 불러오지 못했습니다.");
            }
        });

        document.getElementById("updateBtn").onclick = async () => {
            const newTitle = document.getElementById("editTitle").value.trim();
            const newContent = document.getElementById("editContent").value.trim();

            if (!newTitle || !newContent) {
                alert("제목과 내용을 입력해주세요!");
                return;
            }

            if (confirm("사진 게시글의 내용을 수정하시겠습니까?")) {
                try {
                    const docRef = doc(db, "photo_posts", postId);
                    await updateDoc(docRef, {
                        title: newTitle,
                        content: newContent,
                        updatedAt: new Date()
                    });
                    alert("수정이 완료되었습니다! ✨");
                    location.href = `photo-view.html?id=${postId}`;
                } catch (error) {
                    console.error("수정 오류:", error);
                    alert("수정 중에 오류가 발생했습니다.");
                }
            }
        };
    </script>
</body>
</html>
