<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mellow Joyoon | 사진 보기</title>
    <style>
        /* [디자인 보존] 쫌쫌님의 감각적인 레이아웃 그대로 유지 */
        body { background-color: #f6f6f6; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif; padding: env(safe-area-inset-top) 15px calc(20px + env(safe-area-inset-bottom)) 15px; color: #333; margin: 0; -webkit-tap-highlight-color: transparent; -webkit-text-size-adjust: none; }
        .view-container { width: 100%; max-width: 850px; margin: 20px auto; background: white; padding: clamp(15px, 5vw, 40px); border: 1px solid #ddd; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .post-header { border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .post-category { color: #d63384; font-size: 13px; font-weight: bold; margin-bottom: 8px; }
        .post-title { font-size: clamp(1.4rem, 5.5vw, 2.2rem); font-weight: 800; margin-bottom: 15px; line-height: 1.3; word-break: keep-all; color: #1a1a1a; letter-spacing: -0.5px; }
        .post-info { display: flex; flex-wrap: wrap; align-items: center; font-size: 13px; color: #888; gap: 12px; }
        .post-info .author { color: #333; font-weight: bold; }
        .post-content { line-height: 1.8; font-size: 17px; min-height: 50px; white-space: pre-wrap; padding: 20px 0; word-break: break-all; }
        #post-images { display: flex; flex-direction: column; gap: 25px; margin: 20px 0; }
        #post-images img { width: 100%; max-width: 100%; height: auto; border-radius: 10px; display: block; margin: 0 auto; object-fit: contain; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .post-footer { padding-top: 25px; border-top: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .btn-like { background: #fff; border: 1.5px solid #eee; padding: 14px 26px; cursor: pointer; border-radius: 35px; font-size: 16px; transition: 0.3s; display: flex; align-items: center; gap: 8px; user-select: none; }
        .btn-like:active { transform: scale(0.92); }
        .btn-like.active { background: #fff0f3; border-color: #d63384; color: #d63384; font-weight: bold; }
        .btn-list { background: #f8f8f8; border: 1px solid #ddd; color: #555; padding: 12px 24px; text-decoration: none; font-size: 15px; border-radius: 8px; font-weight: 500; transition: 0.2s; }
        .btn-list:hover { background: #eee; }
        .admin-buttons { display: none; gap: 8px; }
        .btn-edit, .btn-delete { background: #fff; border: 1px solid #ddd; padding: 8px 14px; font-size: 13px; cursor: pointer; color: #666; border-radius: 6px; }
        @media (max-width: 480px) { .post-title { font-size: 1.5rem; } .post-footer { flex-direction: column; } .btn-like, .btn-list { width: 100%; justify-content: center; } }
    </style>
</head>
<body>
    <div class="view-container">
        <div id="loading" style="text-align:center; padding:120px 0; font-size: 15px; color: #999;">
            <div style="margin-bottom: 15px; font-size: 24px;">⏳</div>
            <div>데이터를 안전하게 불러오는 중...</div>
        </div>
        
        <div id="post-detail" style="display:none;">
            <div class="post-header">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px;">
                    <div class="post-category">사진게시판</div>
                    <div class="admin-buttons" id="adminButtons">
                        <button class="btn-edit" id="editBtn">수정</button>
                        <button class="btn-delete" id="deleteBtn">삭제</button>
                    </div>
                </div>
                <h1 class="post-title" id="title"></h1>
                <div class="post-info">
                    <span class="author" id="author"></span>
                    <span id="date"></span>
                    <span>조회 <b id="viewCount">0</b></span>
                </div>
            </div>
            
            <div class="post-content" id="content"></div>
            <div id="post-images"></div>

            <div class="post-footer">
                <div>
                    <button class="btn-like" id="likeBtn">❤️ 좋아요 <span id="likeCount">0</span></button>
                </div>
                <a href="photo-board.html" class="btn-list">목록으로 돌아가기</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, increment, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // 🟢 쫌쫌님의 새 프로젝트 정보로 교체 완료!
        const firebaseConfig = {
            apiKey: "AIzaSyCbdCDMCCDfAlxgJGnkYrsK5czUmVhi6-c",
            authDomain: "mellow-joyoon-final.firebaseapp.com",
            projectId: "mellow-joyoon-final",
            storageBucket: "mellow-joyoon-final.firebasestorage.app",
            messagingSenderId: "947377190182",
            appId: "1:947377190182:web:051cef6c2c810dc0a63de7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');
        const ADMIN_EMAIL = "yun786692@gmail.com"; 

        // 로그인 상태 체크 (비로그인 시에도 보게 하려면 이 로직을 수정해야 함)
        onAuthStateChanged(auth, (user) => {
            if (postId) {
                initPost(user);
            }
        });

        async function initPost(currentUser) {
            // 새 서랍 이름 "photo_posts"에서 데이터 가져오기
            const postRef = doc(db, "photo_posts", postId);
            try {
                // 조회수 올리기
                await updateDoc(postRef, { views: increment(1) });
                const docSnap = await getDoc(postRef);
                
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    document.getElementById("title").innerText = data.title || "제목 없음";
                    document.getElementById("author").innerText = data.author || "익명";
                    document.getElementById("content").innerText = data.content || "";
                    document.getElementById("viewCount").innerText = data.views || 0;
                    document.getElementById("likeCount").innerText = data.likes || 0;
                    
                    const dateObj = data.createdAt ? new Date(data.createdAt.seconds * 1000) : new Date();
                    document.getElementById("date").innerText = dateObj.toLocaleString('ko-KR');

                    // 🖼️ 이미지 출력 (images 배열 안의 모든 사진 출력)
                    const imageContainer = document.getElementById("post-images");
                    imageContainer.innerHTML = ""; // 초기화
                    
                    if (data.images && Array.isArray(data.images)) {
                        data.images.forEach(imgUrl => {
                            const imgTag = document.createElement("img");
                            imgTag.src = imgUrl;
                            imgTag.onerror = () => { imgTag.style.display = 'none'; }; // 깨진 이미지는 숨김
                            imageContainer.appendChild(imgTag);
                        });
                    }

                    // 관리자거나 본인 글이면 수정/삭제 버튼 노출
                    if (currentUser && (currentUser.email === ADMIN_EMAIL || currentUser.uid === data.authorId)) {
                        document.getElementById("adminButtons").style.display = "flex";
                    }

                    document.getElementById("loading").style.display = "none";
                    document.getElementById("post-detail").style.display = "block";

                    setupButtonEvents(postRef);
                } else {
                    alert("삭제된 게시글이거나 경로가 잘못되었습니다.");
                    location.href = 'photo-board.html';
                }
            } catch (error) {
                console.error("로딩 에러:", error);
                document.getElementById("loading").innerText = "데이터 로드 실패 ㅠㅠ";
            }
        }

        function setupButtonEvents(postRef) {
            document.getElementById("likeBtn").onclick = async () => {
                try {
                    await updateDoc(postRef, { likes: increment(1) });
                    const likeSpan = document.getElementById("likeCount");
                    likeSpan.innerText = parseInt(likeSpan.innerText) + 1;
                    document.getElementById("likeBtn").classList.add("active");
                } catch (e) { alert("좋아요 실패!"); }
            };

            document.getElementById("deleteBtn").onclick = async () => {
                if (confirm("정말로 삭제할까요?")) {
                    await deleteDoc(postRef);
                    alert("삭제되었습니다.");
                    location.href = "photo-board.html";
                }
            };

            document.getElementById("editBtn").onclick = () => {
                location.href = `photo-edit.html?id=${postId}`;
            };
        }
    </script>
</body>
</html>
