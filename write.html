<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mellow Joyoon | 글쓰기</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@700&family=Noto+Sans+KR:wght@100;400;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --happy-pink: #ff85a1;
            --sunny-yellow: #ffde59;
            --sky-blue: #87ceeb;
            --text-main: #444;
            --bg-cream: #fffcf2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background-color: var(--bg-cream); 
            font-family: 'Noto Sans KR', sans-serif; 
            padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom);
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ✨ 대문 페이지의 배경 구슬 효과 */
        .deco-circle {
            position: fixed;
            border-radius: 50%;
            z-index: -1;
            filter: blur(40px);
            opacity: 0.4;
            animation: pulse 6s infinite alternate;
        }
        .circle-1 { width: 300px; height: 300px; background: var(--happy-pink); top: -100px; left: -100px; }
        .circle-2 { width: 250px; height: 250px; background: var(--sunny-yellow); bottom: -50px; right: -50px; animation-delay: 1s; }

        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.15); } }

        .write-container { 
            width: 100%;
            max-width: 800px; 
            margin: 40px auto; 
            background: rgba(255, 255, 255, 0.8); 
            padding: 30px; 
            border: 2px solid #fff; 
            box-sizing: border-box;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 133, 161, 0.1);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }
        
        h2 { 
            font-family: 'Gaegu', cursive;
            color: var(--happy-pink); 
            font-size: 2.2rem; 
            text-align: center;
            margin-bottom: 30px; 
            letter-spacing: -1px;
        }
        
        input, textarea { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 15px; 
            border: 2px solid #eee; 
            border-radius: 15px; 
            box-sizing: border-box; 
            font-size: 16px; 
            background-color: #fff;
            color: var(--text-main);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: inherit;
        }
        input::placeholder, textarea::placeholder { color: #ccc; }
        input:focus, textarea:focus { 
            border-color: var(--happy-pink); 
            outline: none; 
            transform: scale(1.01);
            box-shadow: 0 5px 15px rgba(255, 133, 161, 0.1);
        }
        
        input#author { background-color: #f9f9f9; color: #999; cursor: not-allowed; border-style: dashed; }

        .photo-upload-section {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            padding: 15px;
            border: 2px dashed #ffcad6;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.5);
        }

        .photo-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 70px; height: 70px;
            background: #fff;
            border: 2px solid #eee;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.2s;
        }
        .photo-btn:hover { border-color: var(--happy-pink); background: #fff0f3; }
        .photo-btn svg { width: 28px; height: 28px; fill: var(--happy-pink); margin-bottom: 4px; }
        .photo-btn span { font-size: 12px; color: #888; font-weight: bold; }

        #photo-preview-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            flex: 1;
        }

        .preview-box {
            position: relative;
            width: 65px; height: 65px;
            flex-shrink: 0;
        }

        .preview-box img {
            width: 100%; height: 100%;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid #fff;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .del-btn {
            position: absolute;
            top: -8px; right: -8px;
            width: 22px; height: 22px;
            background: var(--happy-pink);
            color: white;
            border-radius: 50%;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid #fff;
        }

        textarea { 
            height: 300px; 
            resize: none; 
            line-height: 1.6; 
        }
        
        .button-group { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin-top: 20px; 
        }
        
        .btn-cancel { 
            flex: 1; 
            max-width: 150px;
            background: #fff; 
            color: #888; 
            border: 2px solid #eee; 
            padding: 15px 0; 
            cursor: pointer; 
            font-size: 16px; 
            text-decoration: none; 
            text-align: center; 
            border-radius: 50px;
            font-weight: bold;
            transition: 0.2s;
        }
        
        .btn-save { 
            flex: 1; 
            max-width: 150px;
            background: var(--happy-pink); 
            color: white; 
            border: none;
            padding: 15px 0; 
            cursor: pointer; 
            font-weight: 900; 
            font-size: 16px; 
            border-radius: 50px;
            box-shadow: 0 6px 0px #e05e7a;
            transition: 0.2s;
        }
        .btn-save:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 0px #e05e7a; }
        .btn-save:active:not(:disabled) { transform: translateY(4px); box-shadow: 0 2px 0px #e05e7a; }
        .btn-save:disabled { background: #ffcad6; box-shadow: 0 4px 0px #eec0ca; cursor: wait; }

        @media (max-width: 480px) {
            .write-container { padding: 20px; border-radius: 20px; margin-top: 20px; }
            h2 { font-size: 1.8rem; }
            .btn-cancel, .btn-save { max-width: none; }
        }
    </style>
</head>
<body>
    <div class="deco-circle circle-1"></div>
    <div class="deco-circle circle-2"></div>

    <div class="write-container">
        <h2>Joyoon Story</h2>
        <input type="text" id="title" placeholder="어떤 이야기를 들려주실 건가요?" autocomplete="off">
        <input type="text" id="author" placeholder="닉네임 불러오는 중..." readonly>

        <div class="photo-upload-section">
            <label for="image-upload" class="photo-btn">
                <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
                <span>사진</span>
            </label>
            <input type="file" id="image-upload" accept="image/*" style="display:none" multiple>
            <div id="photo-preview-container"></div>
        </div>

        <textarea id="content" placeholder="조윤 배우님께 전할 따뜻한 메시지를 남겨주세요! ✨"></textarea>
        
        <div class="button-group">
            <a href="board.html" class="btn-cancel">다음에 쓸게요</a>
            <button class="btn-save" id="saveBtn">등록하기 ➔</button>
        </div>
    </div>

    <script type="module">
        /* 파이어베이스 스크립트 부분은 기존과 동일하게 유지됩니다 (생략 가능) */
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCP4Ur--4UGGpNSK_P7qRvnVFDZbqn436A",
          authDomain: "mellow-joyoon.firebaseapp.com",
          projectId: "mellow-joyoon",
          storageBucket: "mellow-joyoon.firebasestorage.app",
          messagingSenderId: "556097417487",
          appId: "1:556097417487:web:0dca0eb26ba28d893c4e7a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUserName = "";
        let uploadedImages = [];
        let isSaving = false;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserName = user.displayName || "익명의 팬";
                document.getElementById("author").value = currentUserName;
            } else {
                alert("로그인 후 이용 가능합니다. 😊");
                location.href = "login.html";
            }
        });

        // 사진 미리보기 및 삭제 기능
        document.getElementById("image-upload").addEventListener("change", function(e) {
            const files = e.target.files;
            const previewContainer = document.getElementById("photo-preview-container");

            Array.from(files).forEach(file => {
                if (uploadedImages.length >= 5) {
                    alert("사진은 최대 5장까지 가능합니다.");
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(event) {
                    const base64String = event.target.result;
                    uploadedImages.push(base64String);
                    const div = document.createElement("div");
                    div.className = "preview-box";
                    div.innerHTML = `<img src="${base64String}"><div class="del-btn">×</div>`;
                    div.querySelector(".del-btn").onclick = () => {
                        uploadedImages = uploadedImages.filter(img => img !== base64String);
                        div.remove();
                    };
                    previewContainer.appendChild(div);
                };
                reader.readAsDataURL(file);
            });
        });

        // 글 저장 로직
        document.getElementById("saveBtn").addEventListener("click", async () => {
            if (isSaving) return;
            const title = document.getElementById("title").value.trim();
            const content = document.getElementById("content").value.trim();
            const author = document.getElementById("author").value;

            if (!title || !content) {
                alert("내용을 채워주세요! 😉");
                return;
            }

            try {
                isSaving = true;
                const saveBtn = document.getElementById("saveBtn");
                saveBtn.disabled = true;
                saveBtn.innerText = "등록 중...";

                await addDoc(collection(db, "posts"), {
                    title: title,
                    author: author,
                    content: content,
                    images: uploadedImages,
                    createdAt: serverTimestamp(),
                    views: 0,
                    likes: 0
                });
                
                alert("🎉 소중한 글이 등록되었습니다!");
                location.href = "board.html"; 
            } catch (e) {
                isSaving = false;
                saveBtn.disabled = false;
                saveBtn.innerText = "등록하기 ➔";
                alert("오류가 발생했어요. 다시 시도해 주세요!");
            }
        });

        // 배경 구슬 마우스 반응 효과
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            const c1 = document.querySelector('.circle-1');
            const c2 = document.querySelector('.circle-2');
            if(c1) c1.style.transform = `translate(${x * 30}px, ${y * 30}px)`;
            if(c2) c2.style.transform = `translate(${-x * 20}px, ${-y * 20}px)`;
        });
    </script>
</body>
</html>
