<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Mellow Joyoon | 글쓰기</title>
    <style>
        /* 네이버 카페 스타일의 깔끔한 배경과 정갈한 입력창 */
        body { background-color: #f6f6f6; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; padding: 20px; color: #333; }
        .write-container { max-width: 800px; margin: 0 auto; background: white; padding: 40px; border: 1px solid #ddd; }
        
        h2 { color: #d63384; font-size: 1.6rem; border-bottom: 2px solid #333; padding-bottom: 15px; margin-bottom: 30px; }
        
        /* 입력창 테두리를 둥글지 않게, 깔끔하게 변경 */
        input, textarea { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px; 
            border: 1px solid #ccc; 
            border-radius: 0; 
            box-sizing: border-box; 
            font-size: 14px; 
        }
        input:focus, textarea:focus { border-color: #d63384; outline: none; }
        
        textarea { height: 400px; resize: none; line-height: 1.6; }
        
        /* 버튼 영역 */
        .button-group { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .btn-cancel { background: #fff; color: #333; border: 1px solid #ccc; padding: 10px 25px; cursor: pointer; font-size: 14px; text-decoration: none; text-align: center; }
        .btn-save { background: #d63384; color: white; border: 1px solid #d63384; padding: 10px 25px; cursor: pointer; font-weight: bold; font-size: 14px; }
        
        .btn-save:hover { background: #c12a74; }
        .btn-cancel:hover { background: #f9f9f9; }
    </style>
</head>
<body>
    <div class="write-container">
        <h2>자유게시판 글쓰기</h2>
        <input type="text" id="title" placeholder="제목을 입력하세요">
        <input type="text" id="author" placeholder="작성자 이름">
        <textarea id="content" placeholder="조윤 배우님께 전할 메시지나 팬들의 따뜻한 이야기를 들려주세요!"></textarea>
        
        <div class="button-group">
            <a href="board.html" class="btn-cancel">취소</a>
            <button class="btn-save" id="saveBtn">등록하기</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 쫌좀님의 파이어베이스 설정 (절대 공개 금지!)
        const firebaseConfig = {
          apiKey: "AIzaSyCP4Ur--4UGGpNSK_P7qRvnVFDZbqn436A",
          authDomain: "mellow-joyoon.firebaseapp.com",
          projectId: "mellow-joyoon",
          storageBucket: "mellow-joyoon.firebasestorage.app",
          messagingSenderId: "556097417487",
          appId: "1:556097417487:web:0dca0eb26ba28d893c4e7a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById("saveBtn").addEventListener("click", async () => {
            const title = document.getElementById("title").value.trim();
            const author = document.getElementById("author").value.trim();
            const content = document.getElementById("content").value.trim();

            if (!title || !author || !content) {
                alert("빈칸 없이 모두 입력해 주세요! 조윤 배우님이 기다리신답니다. 😉");
                return;
            }

            try {
                // 'posts' 컬렉션에 데이터 저장
                // 쫌좀님, 여기서 views와 likes를 확실히 0으로 넣어줘야 나중에 숫자가 잘 올라가요!
                await addDoc(collection(db, "posts"), {
                    title: title,
                    author: author,
                    content: content,
                    createdAt: serverTimestamp(),
                    views: 0,
                    likes: 0
                });
                
                alert("🎉 글이 성공적으로 등록되었습니다!");
                location.href = "board.html"; 
            } catch (e) {
                console.error("등록 중 에러 발생: ", e);
                alert("앗, 서버에 저장하지 못했어요. 네트워크 연결을 확인해 주세요!");
            }
        });
    </script>
</body>
</html>
