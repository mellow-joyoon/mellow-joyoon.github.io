<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mellow Joyoon | 글쓰기</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root {
            --primary: #d63384;
            --bg: #0b0b0b; /* 필모그래피 배경색 */
            --card-bg: rgba(255, 255, 255, 0.05); /* 필모그래피 카드 스타일 */
            --border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(255, 255, 255, 0.08);
        }

        body { 
            background-color: var(--bg); 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; 
            padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom);
            color: #eee; margin: 0;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }
        
        .write-container { 
            width: 100%;
            max-width: 800px; 
            margin: 20px auto; 
            background: var(--card-bg); 
            padding: 25px; 
            border: 1px solid var(--border); 
            box-sizing: border-box;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        
        h2 { 
            color: var(--primary); 
            font-size: clamp(1.2rem, 5vw, 1.6rem); 
            border-bottom: 1px solid var(--primary); 
            padding-bottom: 15px; 
            margin-bottom: 25px; 
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        input, textarea { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 15px; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 15px; 
            background-color: var(--input-bg);
            color: #fff;
            transition: all 0.2s;
            font-family: inherit;
        }
        input::placeholder, textarea::placeholder { color: #666; }
        input:focus, textarea:focus { border-color: var(--primary); outline: none; background-color: rgba(255,255,255,0.12); }
        
        /* 읽기 전용 작성자 칸 스타일 */
        input#author { background-color: rgba(255, 255, 255, 0.03); color: #888; cursor: not-allowed; border-style: dashed; }

        .photo-upload-section {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            padding: 12px;
            border: 1px dashed var(--border);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.02);
        }

        .photo-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 65px;
            height: 65px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .photo-btn:hover { border-color: var(--primary); background: rgba(214, 51, 132, 0.1); }
        .photo-btn svg { width: 24px; height: 24px; fill: var(--primary); margin-bottom: 4px; }
        .photo-btn span { font-size: 11px; color: #aaa; }

        #photo-preview-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            flex: 1;
            padding: 5px 0;
        }

        .preview-box {
            position: relative;
            width: 60px;
            height: 60px;
            flex-shrink: 0;
        }

        .preview-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .del-btn {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 20px;
            height: 20px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        textarea { 
            height: 350px; 
            min-height: 250px;
            resize: none; 
            line-height: 1.6; 
        }
        
        .button-group { 
            display: flex; 
            justify-content: flex-end; 
            gap: 12px; 
            margin-top: 15px; 
        }
        
        .btn-cancel { 
            flex: 1; 
            max-width: 120px;
            background: transparent; 
            color: #aaa; 
            border: 1px solid var(--border); 
            padding: 14px 0; 
            cursor: pointer; 
            font-size: 14px; 
            text-decoration: none; 
            text-align: center; 
            border-radius: 8px;
            transition: 0.2s;
        }
        .btn-cancel:hover { background: rgba(255,255,255,0.05); color: #fff; }
        
        .btn-save { 
            flex: 1; 
            max-width: 120px;
            background: var(--primary); 
            color: white; 
            border: none;
            padding: 14px 0; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 14px; 
            border-radius: 8px;
            transition: 0.3s;
        }
        .btn-save:hover:not(:disabled) { 
            background: #e64a96; 
            box-shadow: 0 0 15px rgba(214, 51, 132, 0.4);
            transform: translateY(-2px);
        }
        
        .btn-save:disabled { background: #863d61; cursor: wait; opacity: 0.6; }

        @media (max-width: 480px) {
            .write-container { padding: 18px; margin-top: 10px; }
            .btn-cancel, .btn-save { max-width: none; }
        }
    </style>
</head>
<body>
    <div class="write-container">
        <h2>자유게시판 글쓰기</h2>
        <input type="text" id="title" placeholder="제목을 입력하세요" autocomplete="off">
        <input type="text" id="author" placeholder="작성자 닉네임 로딩 중..." readonly>

        <div class="photo-upload-section">
            <label for="image-upload" class="photo-btn">
                <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
                <span>사진</span>
            </label>
            <input type="file" id="image-upload" accept="image/*" style="display:none" multiple>
            <div id="photo-preview-container"></div>
        </div>

        <textarea id="content" placeholder="조윤 배우님께 전할 메시지나 팬들의 따뜻한 이야기를 들려주세요!"></textarea>
        
        <div class="button-group">
            <a href="board.html" class="btn-cancel">취소</a>
            <button class="btn-save" id="saveBtn">등록하기</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCP4Ur--4UGGpNSK_P7qRvnVFDZbqn436A",
          authDomain: "mellow-joyoon.firebaseapp.com",
          projectId: "mellow-joyoon",
          storageBucket: "mellow-joyoon.firebasestorage.app",
          messagingSenderId: "556097417487",
          appId: "1:556097417487:web:0dca0eb26ba28d893c4e7a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUserName = "";
        let uploadedImages = [];
        let isSaving = false;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserName = user.displayName || "익명의 팬";
                document.getElementById("author").value = currentUserName;
            } else {
                alert("로그인 후 이용 가능합니다. 😊");
                location.href = "login.html";
            }
        });

        document.getElementById("image-upload").addEventListener("change", function(e) {
            const files = e.target.files;
            const previewContainer = document.getElementById("photo-preview-container");

            Array.from(files).forEach(file => {
                if (uploadedImages.length >= 5) {
                    alert("사진은 최대 5장까지 가능합니다.");
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(event) {
                    const base64String = event.target.result;
                    uploadedImages.push(base64String);

                    const div = document.createElement("div");
                    div.className = "preview-box";
                    div.innerHTML = `
                        <img src="${base64String}">
                        <div class="del-btn">×</div>
                    `;
                    div.querySelector(".del-btn").onclick = () => {
                        uploadedImages = uploadedImages.filter(img => img !== base64String);
                        div.remove();
                    };
                    previewContainer.appendChild(div);
                };
                reader.readAsDataURL(file);
            });
        });

        document.getElementById("saveBtn").addEventListener("click", async () => {
            if (isSaving) return;

            const title = document.getElementById("title").value.trim();
            const content = document.getElementById("content").value.trim();
            const author = document.getElementById("author").value;

            if (!title || !content) {
                alert("제목과 내용을 모두 입력해 주세요! 😉");
                return;
            }

            try {
                isSaving = true;
                const saveBtn = document.getElementById("saveBtn");
                saveBtn.disabled = true;
                saveBtn.innerText = "등록 중...";

                await addDoc(collection(db, "posts"), {
                    title: title,
                    author: author,
                    content: content,
                    images: uploadedImages,
                    createdAt: serverTimestamp(),
                    views: 0,
                    likes: 0
                });
                
                alert("🎉 글이 성공적으로 등록되었습니다!");
                location.href = "board.html"; 
            } catch (e) {
                console.error("등록 에러: ", e);
                alert("저장에 실패했습니다. 다시 시도해 주세요.");
                isSaving = false;
                document.getElementById("saveBtn").disabled = false;
                document.getElementById("saveBtn").innerText = "등록하기";
            }
        });
    </script>
</body>
</html>
