<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mellow Joyoon | 글쓰기</title>
    <style>
        /* 네이버 카페 스타일의 깔끔한 배경과 정갈한 입력창 */
        body { 
            background-color: #f6f6f6; 
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; 
            padding: 15px; /* 모바일 테두리 여백 조절 */
            color: #333; 
            margin: 0;
        }
        
        /* 📱 컨테이너: 모바일에서 화면을 가득 채우도록 설정 */
        .write-container { 
            width: 100%;
            max-width: 800px; 
            margin: 0 auto; 
            background: white; 
            padding: 20px; /* 내부 여백 조절 */
            border: 1px solid #ddd; 
            box-sizing: border-box;
            border-radius: 8px;
        }
        
        h2 { 
            color: #d63384; 
            font-size: clamp(1.2rem, 5vw, 1.6rem); 
            border-bottom: 2px solid #333; 
            padding-bottom: 15px; 
            margin-bottom: 20px; 
        }
        
        /* 📱 입력창: 모바일에서 터치하기 편하게 높이와 폰트 조절 */
        input, textarea { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 12px; 
            border: 1px solid #ccc; 
            border-radius: 4px; /* 살짝 부드럽게 */
            box-sizing: border-box; 
            font-size: 16px; /* 📱 iOS에서 포커스 시 화면 확대 방지를 위해 16px 권장 */
        }
        input:focus, textarea:focus { border-color: #d63384; outline: none; }
        
        input#author { background-color: #f9f9f9; color: #777; cursor: not-allowed; }

        /* 📱 본문 영역: 모바일에서는 높이를 조금 줄여서 자판 공간 확보 */
        textarea { 
            height: 350px; 
            min-height: 250px;
            resize: none; 
            line-height: 1.6; 
        }
        
        /* 버튼 영역: 모바일에서 버튼이 나란히 배치되도록 */
        .button-group { 
            display: flex; 
            justify-content: flex-end; 
            gap: 10px; 
            margin-top: 10px; 
        }
        
        .btn-cancel { 
            flex: 1; /* 모바일에서 버튼 너비 균등 배분 */
            max-width: 120px;
            background: #fff; 
            color: #333; 
            border: 1px solid #ccc; 
            padding: 12px 0; 
            cursor: pointer; 
            font-size: 14px; 
            text-decoration: none; 
            text-align: center; 
            border-radius: 4px;
        }
        
        .btn-save { 
            flex: 1; 
            max-width: 120px;
            background: #d63384; 
            color: white; 
            border: 1px solid #d63384; 
            padding: 12px 0; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 14px; 
            border-radius: 4px;
        }
        
        .btn-save:hover { background: #c12a74; }
        .btn-cancel:hover { background: #f9f9f9; }

        /* 모바일용 작은 화면 대응 */
        @media (max-width: 480px) {
            .write-container { padding: 15px; }
            h2 { margin-bottom: 15px; }
            .btn-cancel, .btn-save { max-width: none; } /* 모바일에선 버튼 크게 */
        }
    </style>
</head>
<body>
    <div class="write-container">
        <h2>자유게시판 글쓰기</h2>
        <input type="text" id="title" placeholder="제목을 입력하세요" autocomplete="off">
        <input type="text" id="author" placeholder="작성자 닉네임 로딩 중..." readonly>
        <textarea id="content" placeholder="조윤 배우님께 전할 메시지나 팬들의 따뜻한 이야기를 들려주세요!"></textarea>
        
        <div class="button-group">
            <a href="board.html" class="btn-cancel">취소</a>
            <button class="btn-save" id="saveBtn">등록하기</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCP4Ur--4UGGpNSK_P7qRvnVFDZbqn436A",
          authDomain: "mellow-joyoon.firebaseapp.com",
          projectId: "mellow-joyoon",
          storageBucket: "mellow-joyoon.firebasestorage.app",
          messagingSenderId: "556097417487",
          appId: "1:556097417487:web:0dca0eb26ba28d893c4e7a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUserName = "";

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserName = user.displayName || "익명의 팬";
                document.getElementById("author").value = currentUserName;
            } else {
                alert("팬 로그인 후 이용 가능한 공간입니다. 로그인 페이지로 이동합니다. 😊");
                location.href = "login.html";
            }
        });

        document.getElementById("saveBtn").addEventListener("click", async () => {
            const title = document.getElementById("title").value.trim();
            const content = document.getElementById("content").value.trim();
            const author = document.getElementById("author").value;

            if (!title || !content) {
                alert("제목과 내용을 모두 입력해 주세요! 조윤 배우님이 기다리신답니다. 😉");
                return;
            }

            try {
                await addDoc(collection(db, "posts"), {
                    title: title,
                    author: author,
                    content: content,
                    createdAt: serverTimestamp(),
                    views: 0,
                    likes: 0
                });
                
                alert("🎉 글이 성공적으로 등록되었습니다!");
                location.href = "board.html"; 
            } catch (e) {
                console.error("등록 중 에러 발생: ", e);
                alert("앗, 서버에 저장하지 못했어요. 네트워크 연결을 확인해 주세요!");
            }
        });
    </script>
</body>
</html>
