<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MELLOW | SELECT MENU</title>
    <style>
        body { 
            margin: 0; padding: 0; background: #eef2f6; 
            min-height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            font-family: 'Apple SD Gothic Neo', sans-serif; overflow-x: hidden;
        }

        /* 🎵 BGM 플레이어 (좌측 상단) */
        .bgm-player { 
            position: fixed; top: 30px; left: 30px; z-index: 10001; 
            display: flex; align-items: center; gap: 15px; padding: 10px 20px; 
            background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(15px); 
            border-radius: 100px; border: 1px solid rgba(255, 255, 255, 0.6); 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02); 
        }
        .visualizer { display: flex; align-items: center; gap: 3px; height: 12px; cursor: pointer; }
        .bar { width: 2px; height: 100%; background: #a5b8d0; border-radius: 2px; transition: 0.3s; }
        .playing .bar { animation: wave 1s ease-in-out infinite; }
        @keyframes wave { 0%, 100% { height: 4px; } 50% { height: 12px; } }
        .control-group { display: flex; align-items: center; gap: 12px; border-left: 1px solid rgba(165, 184, 208, 0.2); padding-left: 12px; }
        .track-num { font-size: 10px; color: #a5b8d0; font-weight: 800; letter-spacing: 1px; }
        .btn-icon { cursor: pointer; color: #a5b8d0; font-size: 14px; opacity: 0.8; }

        /* 🏠 좌측 사이드 아이콘 바 */
        .side-nav {
            position: fixed; left: 30px; top: 85px; 
            display: flex; flex-direction: column; gap: 15px; z-index: 10000;
        }
        .nav-btn { 
            width: 45px; height: 45px; background: rgba(255, 255, 255, 0.8); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 1.2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.03); 
            text-decoration: none; transition: 0.3s;
        }
        .nav-btn:hover { transform: scale(1.1); background: white; }

        /* 배우 카드 컨테이너 - 조윤 버튼 단독 중앙 정렬 */
        .actor-container { display: flex; justify-content: center; margin-bottom: 20px; width: 100%; }

        /* 배우 카드 (조윤 전용 컬러 적용) */
        .actor-card { 
            text-decoration: none; width: 530px; height: 140px; 
            background: #eef2f6; border-radius: 40px; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 15px 15px 30px #d1d9e6, -15px -15px 30px #ffffff; 
            transition: all 0.3s ease;
        }
        .actor-name { font-size: 1.4rem; font-weight: 800; color: #a5b8d0; letter-spacing: 5px; transition: 0.4s; }

        .actor-card:hover { 
            box-shadow: inset 8px 8px 16px #d1d9e6, inset -8px -8px 16px #ffffff; 
            transform: scale(0.98); 
        }

        /* 📝 익명 게시판 버튼 */
        .guestbook-btn {
            margin-top: 30px; text-decoration: none; width: 530px; height: 100px;
            background: #eef2f6; border-radius: 40px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 15px 15px 30px #d1d9e6, -15px -15px 30px #ffffff;
            transition: all 0.4s ease;
        }
        .guestbook-name { font-size: 1.1rem; font-weight: 900; color: #a5b8d0; letter-spacing: 5px; }
        
        .guestbook-btn:hover { 
            box-shadow: inset 8px 8px 16px #d1d9e6, inset -8px -8px 16px #ffffff; 
            transform: scale(0.98); 
        }

        .back-link { 
            position: fixed; bottom: 50px; text-decoration: none; color: #a5b8d0; 
            font-size: 0.85rem; font-weight: 700; letter-spacing: 2px; opacity: 0.8; transition: 0.3s; 
        }

        /* 📱 모바일 반응형 디자인 */
        @media (max-width: 768px) {
            body { justify-content: center; padding: 20px 0; }
            .bgm-player { top: 20px; left: 20px; transform: scale(0.85); transform-origin: left top; }
            .side-nav { left: auto; right: 20px; top: 20px; flex-direction: row; }
            .actor-container { margin-top: 80px; }
            .actor-card { width: 85%; height: 110px; }
            .actor-name { font-size: 1.1rem; }
            .guestbook-btn { width: 85%; height: 90px; }
            .back-link { position: relative; bottom: auto; margin-top: 50px; }
        }
    </style>
</head>
<body>

    <div class="bgm-player">
        <div class="visualizer" id="visualizer" onclick="toggleMusic()">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
        <div class="control-group">
            <div class="track-num" id="track-info">01</div>
            <div class="btn-icon" onclick="nextMusic()">→</div>
        </div>
        <audio id="main-bgm" loop><source id="audio-source" src="bgm1.mp3" type="audio/mpeg"></audio>
    </div>

    <div class="side-nav">
        <a href="index.html" class="nav-btn" title="홈">🏠</a>
        <a href="guestbook.html" class="nav-btn" title="익명 게시판">📝</a>
    </div>

    <div class="actor-container">
        <a href="joyoon-list.html" class="actor-card">
            <span class="actor-name">JO YOON FILMOGRAPHY</span>
        </a>
    </div>

    <a href="guestbook.html" class="guestbook-btn">
        <span class="guestbook-name">GUESTBOOK</span>
    </a>

    <a href="index.html" class="back-link">← BACK TO HOME</a>

    <script>
        const playlist = ["bgm1.mp3", "bgm2.mp3", "bgm3.mp3"];
        let currentTrack = 0;
        const music = document.getElementById('main-bgm');
        const source = document.getElementById('audio-source');
        const trackInfo = document.getElementById('track-info');
        const visualizer = document.getElementById('visualizer');

        function toggleMusic() {
            if (music.paused) { music.play(); visualizer.classList.add('playing'); } 
            else { music.pause(); visualizer.classList.remove('playing'); }
        }
        function nextMusic() {
            currentTrack = (currentTrack + 1) % playlist.length;
            source.src = playlist[currentTrack];
            music.load(); music.play();
            trackInfo.innerText = (currentTrack + 1).toString().padStart(2, '0');
            visualizer.classList.add('playing');
        }
    </script>
</body>
</html>
