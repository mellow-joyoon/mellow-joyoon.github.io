<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mellow Joyoon | 사진 올리기</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;400;900&display=swap" rel="stylesheet">
    <style>
        /* ✅ 기존 디자인 스타일 유지 */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f6f6f6; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif; padding: env(safe-area-inset-top) 15px calc(20px + env(safe-area-inset-bottom)); color: #333; display: flex; flex-direction: column; align-items: center; }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f6f6f6; display: flex; justify-content: center; align-items: center; z-index: 9999; font-weight: bold; color: #d63384; }
        .write-container { width: 100%; max-width: 850px; margin: 20px auto; background: white; padding: clamp(15px, 4vw, 30px); border: 1px solid #ddd; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .board-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 15px; margin-bottom: 25px; }
        h2 { color: #d63384; font-size: clamp(1.3rem, 5vw, 1.8rem); font-weight: 900; }
        .top-admin-group { display: flex; gap: 8px; }
        .btn-top { padding: 6px 12px; font-size: 13px; font-weight: bold; border-radius: 6px; cursor: pointer; border: none; display: none; }
        .btn-edit-top { background: #d63384; color: white; }
        .btn-delete-top { background: #444; color: white; }
        input, textarea { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; font-family: inherit; }
        input:focus, textarea:focus { border-color: #d63384; outline: none; background-color: #fffafc; }
        .photo-upload-section { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; padding: 15px; border: 2px dashed #eee; border-radius: 10px; background: #fafafa; min-height: 80px; }
        .photo-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 65px; height: 65px; background: white; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; flex-shrink: 0; }
        .photo-btn svg { width: 26px; height: 26px; fill: #d63384; margin-bottom: 4px; }
        .photo-btn span { font-size: 12px; color: #666; font-weight: bold; }
        #photo-preview-container { display: flex; gap: 10px; overflow-x: auto; flex: 1; padding: 5px 2px; }
        .preview-box { position: relative; width: 65px; height: 65px; flex-shrink: 0; }
        .preview-box img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; border: 1px solid #eee; }
        .del-btn { position: absolute; top: -6px; right: -6px; width: 22px; height: 22px; background: #333; color: white; border-radius: 50%; font-size: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid white; }
        textarea { height: clamp(250px, 40vh, 450px); resize: none; line-height: 1.6; }
        .button-group { display: flex; justify-content: center; gap: 12px; margin-top: 15px; width: 100%; }
        .btn-cancel { flex: 1; max-width: 140px; background: #fff; color: #666; border: 1px solid #ccc; padding: 14px 0; cursor: pointer; font-size: 15px; text-decoration: none; text-align: center; border-radius: 8px; font-weight: 500; }
        .btn-save { flex: 1; max-width: 140px; background: #d63384; color: white; border: none; padding: 14px 0; cursor: pointer; font-weight: bold; font-size: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(214, 51, 132, 0.2); }
    </style>
</head>
<body>

    <div id="loading-overlay">사용자 확인 중...</div>

    <div class="write-container">
        <div class="board-header">
            <h2 id="page-title">사진게시판 글쓰기</h2>
            <div class="top-admin-group">
                <button class="btn-top btn-edit-top" id="topEditBtn">수정</button>
                <button class="btn-top btn-delete-top" id="topDeleteBtn">삭제</button>
            </div>
        </div>

        <input type="text" id="title" placeholder="제목을 입력하세요">
        <input type="text" id="author" placeholder="닉네임 불러오는 중..." readonly>

        <div class="photo-upload-section">
            <label for="image-upload" class="photo-btn">
                <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
                <span>사진</span>
            </label>
            <input type="file" id="image-upload" accept="image/*" style="display:none" multiple>
            <div id="photo-preview-container"></div>
        </div>

        <textarea id="content" placeholder="소중한 사진과 함께 이야기를 들려주세요!"></textarea>
        
        <div class="button-group">
            <a href="photo-board.html" class="btn-cancel">취소</a>
            <button class="btn-save" id="saveBtn">등록하기</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, addDoc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // ✅ [하이브리드 설정 적용 완료]
        // 회원정보는 기존 프로젝트(mellow-joyoon)에서, 사진 저장은 새 프로젝트(mellow-joyoon-final)로 연결합니다.
        const firebaseConfig = {
            apiKey: "여기에_기존_자유게시판_API_KEY를_넣으세요", 
            authDomain: "mellow-joyoon.firebaseapp.com",
            projectId: "mellow-joyoon",
            appId: "여기에_기존_자유게시판_APP_ID를_넣으세요",
            // 👇 사진 저장 위치만 'final' 프로젝트 저장소로 지정
            storageBucket: "mellow-joyoon-final.firebasestorage.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');
        let selectedFiles = [];
        let existingImages = [];
        let currentUID = null;

        // 로그인 상태 체크 및 닉네임 자동 표시
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUID = user.uid;
                // 닉네임이 있으면 닉네임을, 없으면 이메일 앞부분을 표시
                document.getElementById("author").value = user.displayName || user.email.split('@')[0];
                if (postId) { await loadPostData(); }
                document.getElementById("loading-overlay").style.display = "none";
            } else {
                alert("로그인이 확인되지 않습니다. 기존 계정으로 로그인해주세요.");
                location.href = "login.html";
            }
        });

        // 데이터 로드 기능
        async function loadPostData() {
            try {
                const docSnap = await getDoc(doc(db, "photo_posts", postId));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById("title").value = data.title;
                    document.getElementById("content").value = data.content;
                    existingImages = data.images || [];
                    renderPreviews();
                }
            } catch (e) { console.error("데이터 로드 실패:", e); }
        }

        // 사진 미리보기 기능
        function renderPreviews() {
            const container = document.getElementById("photo-preview-container");
            container.innerHTML = "";
            existingImages.forEach((url, idx) => {
                const div = document.createElement("div"); div.className = "preview-box";
                div.innerHTML = `<img src="${url}"><div class="del-btn">×</div>`;
                div.querySelector(".del-btn").onclick = () => { existingImages.splice(idx, 1); renderPreviews(); };
                container.appendChild(div);
            });
            selectedFiles.forEach((file, idx) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const div = document.createElement("div"); div.className = "preview-box";
                    div.innerHTML = `<img src="${e.target.result}"><div class="del-btn">×</div>`;
                    div.querySelector(".del-btn").onclick = () => { selectedFiles.splice(idx, 1); renderPreviews(); };
                    container.appendChild(div);
                };
                reader.readAsDataURL(file);
            });
        }

        document.getElementById("image-upload").addEventListener("change", (e) => {
            selectedFiles.push(...Array.from(e.target.files));
            renderPreviews();
        });

        // 저장 버튼 클릭 시 실행
        document.getElementById("saveBtn").onclick = async () => {
            const title = document.getElementById("title").value;
            const content = document.getElementById("content").value;

            if(!title || !content) {
                alert("제목과 내용을 모두 입력해주세요!");
                return;
            }

            const btn = document.getElementById("saveBtn");
            btn.disabled = true;
            btn.innerText = "처리 중...";

            try {
                const urls = [...existingImages];
                for (const file of selectedFiles) {
                    // storageBucket 설정에 의해 mellow-joyoon-final 프로젝트로 업로드됨
                    const sRef = ref(storage, `photos/${Date.now()}_${file.name}`);
                    const snap = await uploadBytes(sRef, file);
                    urls.push(await getDownloadURL(snap.ref));
                }

                const data = { 
                    title: title, 
                    content: content, 
                    author: document.getElementById("author").value, 
                    authorId: currentUID, 
                    images: urls, 
                    thumbnail: urls[0] || "",
                    updatedAt: serverTimestamp() 
                };

                if (postId) {
                    await updateDoc(doc(db, "photo_posts", postId), data);
                } else {
                    data.createdAt = serverTimestamp();
                    data.views = 0;
                    data.likes = 0;
                    await addDoc(collection(db, "photo_posts"), data);
                }
                location.href = "photo-board.html";
            } catch (e) {
                alert("저장 중 오류가 발생했습니다: " + e.message);
                btn.disabled = false;
                btn.innerText = "등록하기";
            }
        };
    </script>
</body>
</html>
