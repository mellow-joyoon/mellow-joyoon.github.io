<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Mellow Joyoon | 사진 올리기</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;400;900&display=swap" rel="stylesheet">
    <style>
        /* ✅ 쫌쫌님의 소중한 기존 디자인 100% 보존 + 반응형 강화 */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: #f6f6f6; 
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif; 
            padding: env(safe-area-inset-top) 15px calc(20px + env(safe-area-inset-bottom)); 
            color: #333; 
            display: flex;
            flex-direction: column;
            align-items: center; /* 전체 중앙 정렬 */
            -webkit-overflow-scrolling: touch; 
            -webkit-text-size-adjust: none; 
        }

        .write-container { 
            width: 100%; 
            max-width: 800px; /* 게시판과 통일감 있게 조정 */
            margin: 20px auto; 
            background: white; 
            padding: clamp(15px, 4vw, 30px); 
            border: 1px solid #ddd; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }

        h2 { color: #d63384; font-size: clamp(1.3rem, 5vw, 1.8rem); border-bottom: 2px solid #333; padding-bottom: 15px; margin-bottom: 25px; font-weight: 900; letter-spacing: -0.5px; }
        
        input, textarea { 
            width: 100%; padding: 14px; margin-bottom: 15px; 
            border: 1px solid #ddd; border-radius: 8px; 
            font-size: 16px; transition: all 0.2s; font-family: inherit; 
        }
        input:focus, textarea:focus { border-color: #d63384; outline: none; background-color: #fffafc; }

        /* 📸 사진 업로드 섹션 */
        .photo-upload-section { 
            display: flex; align-items: center; gap: 12px; 
            margin-bottom: 15px; padding: 15px; 
            border: 2px dashed #eee; border-radius: 10px; 
            background: #fafafa; min-height: 90px;
        }
        .photo-btn { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            width: 65px; height: 65px; background: white; 
            border: 1px solid #ddd; border-radius: 8px; 
            cursor: pointer; flex-shrink: 0; 
        }
        .photo-btn svg { width: 26px; height: 26px; fill: #d63384; margin-bottom: 4px; }
        .photo-btn span { font-size: 11px; color: #666; font-weight: bold; }

        #photo-preview-container { display: flex; gap: 10px; overflow-x: auto; flex: 1; padding: 5px 2px; }
        #photo-preview-container::-webkit-scrollbar { display: none; }
        
        .preview-box { position: relative; width: 65px; height: 65px; flex-shrink: 0; }
        .preview-box img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; border: 1px solid #eee; }
        .del-btn { 
            position: absolute; top: -6px; right: -6px; 
            width: 22px; height: 22px; background: #333; 
            color: white; border-radius: 50%; font-size: 14px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; z-index: 10; border: 2px solid white; 
        }

        textarea { height: clamp(200px, 35vh, 450px); resize: none; line-height: 1.6; }

        /* 🔘 버튼 그룹: 모바일에서 중앙 및 꽉 차게 조절 */
        .button-group { display: flex; justify-content: center; gap: 12px; margin-top: 15px; width: 100%; }
        .btn-cancel { 
            flex: 1; max-width: 140px; background: #fff; color: #666; 
            border: 1px solid #ccc; padding: 14px 0; 
            text-decoration: none; text-align: center; border-radius: 8px; 
            font-size: 15px; font-weight: 500; 
        }
        .btn-save { 
            flex: 1; max-width: 140px; background: #d63384; color: white; 
            border: none; padding: 14px 0; cursor: pointer; 
            font-weight: bold; font-size: 15px; border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(214, 51, 132, 0.2);
        }
        .btn-save:disabled { background: #edaecb !important; cursor: not-allowed; }

        @media (max-width: 768px) {
            .write-container { margin: 10px auto; border-radius: 15px; width: 95%; }
            .button-group { gap: 10px; }
        }
    </style>
</head>
<body>

    <div class="write-container">
        <h2 id="page-title">사진게시판 글쓰기</h2>
        <input type="text" id="title" placeholder="제목을 입력하세요" autocomplete="off">
        <input type="text" id="author" placeholder="닉네임을 입력해주세요">

        <div class="photo-upload-section">
            <label for="image-upload" class="photo-btn">
                <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
                <span>사진</span>
            </label>
            <input type="file" id="image-upload" accept="image/*" style="display:none" multiple>
            <div id="photo-preview-container"></div>
        </div>

        <textarea id="content" placeholder="소중한 사진과 함께 이야기를 들려주세요!"></textarea>
        
        <div class="button-group">
            <a href="photo-board.html" class="btn-cancel">취소</a>
            <button class="btn-save" id="saveBtn">등록하기</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCbdCDMCCDfAlxgJGnkYrsK5czUmVhi6-c",
            authDomain: "mellow-joyoon-final.firebaseapp.com",
            projectId: "mellow-joyoon-final",
            storageBucket: "mellow-joyoon-final.firebasestorage.app",
            messagingSenderId: "947377190182",
            appId: "1:947377190182:web:051cef6c2c810dc0a63de7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let selectedFiles = [];

        document.getElementById("image-upload").addEventListener("change", function(e) {
            const files = Array.from(e.target.files);
            const previewContainer = document.getElementById("photo-preview-container");

            files.forEach(file => {
                if (selectedFiles.length >= 5) return alert("최대 5장까지 가능합니다.");
                
                selectedFiles.push(file);
                const reader = new FileReader();
                reader.onload = (event) => {
                    const div = document.createElement("div");
                    div.className = "preview-box";
                    div.innerHTML = `<img src="${event.target.result}"><div class="del-btn">×</div>`;
                    div.querySelector(".del-btn").onclick = () => {
                        selectedFiles = selectedFiles.filter(f => f !== file);
                        div.remove();
                    };
                    previewContainer.appendChild(div);
                };
                reader.readAsDataURL(file);
            });
        });

        document.getElementById("saveBtn").onclick = async () => {
            const title = document.getElementById("title").value.trim();
            const content = document.getElementById("content").value.trim();
            const author = document.getElementById("author").value.trim();

            if (!title || !content || !author || selectedFiles.length === 0) {
                return alert("내용과 사진을 모두 확인해 주세요! 📸");
            }

            const btn = document.getElementById("saveBtn");
            btn.disabled = true;
            btn.innerText = "업로드 중...";

            try {
                const imageUrls = [];
                for (const file of selectedFiles) {
                    const storageRef = ref(storage, 'photos/' + Date.now() + "_" + file.name);
                    const snapshot = await uploadBytes(storageRef, file);
                    const url = await getDownloadURL(snapshot.ref);
                    imageurls.push(url);
                }

                await addDoc(collection(db, "photo_posts"), {
                    title: title,
                    content: content,
                    author: author,
                    images: imageUrls,
                    thumbnail: imageUrls[0],
                    createdAt: serverTimestamp(),
                    views: 0, // 조회수 초기화 추가
                    likes: 0  // 좋아요 초기화 추가
                });

                alert("성공적으로 등록되었습니다! ✨");
                location.href = "photo-board.html";

            } catch (err) {
                console.error(err);
                alert("등록 실패! 파일 크기를 확인해주세요.");
                btn.disabled = false;
                btn.innerText = "등록하기";
            }
        };
    </script>
</body>
</html>
