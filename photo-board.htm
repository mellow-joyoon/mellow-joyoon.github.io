<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mellow Joyoon | 사진게시판</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@700&family=Montserrat:wght@900&family=Noto+Sans+KR:wght@100;400;900&display=swap" rel="stylesheet">
    <link href="https://webfontworld.github.io/gmarket/GmarketSans.css" rel="stylesheet">

    <style>
        :root {
            --happy-pink: #ff85a1;
            --sunny-yellow: #ffde59;
            --sky-blue: #87ceeb;
            --text-main: #444;
            --bg-cream: #fffcf2;
            --card-white: rgba(255, 255, 255, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg-cream); 
            font-family: 'Noto Sans KR', sans-serif; 
            padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom);
            color: var(--text-main); 
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden; width: 100%; min-height: 100vh;
        }

        /* 배경 구슬 효과 */
        .deco-circle { position: fixed; border-radius: 50%; z-index: -1; filter: blur(40px); opacity: 0.4; animation: pulse 6s infinite alternate; }
        .circle-1 { width: 350px; height: 350px; background: var(--happy-pink); top: -100px; left: -100px; }
        .circle-2 { width: 300px; height: 300px; background: var(--sunny-yellow); bottom: -50px; right: -50px; }

        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        /* 상단 네비게이션 */
        .top-bar {
            width: 100%; max-width: 1000px; margin: 15px 0;
            display: flex; justify-content: space-between; align-items: center;
            background: var(--card-white); padding: 12px 20px; 
            border: 2px solid #fff; border-radius: 50px; 
            backdrop-filter: blur(10px); box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .nav-links { display: flex; gap: 15px; }
        .nav-links a { text-decoration: none; color: var(--happy-pink); font-weight: 900; font-size: 14px; }
        .nav-links a.active { color: #d63384; text-decoration: underline; }

        /* 사진 게시판 그리드 레이아웃 */
        .photo-container { 
            width: 100%; max-width: 1000px; background: var(--card-white); padding: 25px; 
            border: 2px solid #fff; border-radius: 30px; backdrop-filter: blur(10px);
            margin-bottom: 40px;
        }
        .board-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .board-header h2 { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 2rem; }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }
        .photo-card {
            background: #fff; border-radius: 15px; overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.3s;
            cursor: pointer;
        }
        .photo-card:hover { transform: translateY(-5px); }
        .photo-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #f0f0f0; }
        
        .photo-info { padding: 12px; }
        .photo-title { font-size: 14px; font-weight: bold; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .photo-meta { font-size: 12px; color: #888; display: flex; justify-content: space-between; }

        .btn-write { 
            background: var(--happy-pink); color: white; padding: 10px 20px; 
            font-size: 14px; font-weight: 900; border-radius: 50px; text-decoration: none;
            box-shadow: 0 4px 0px #e05e7a;
        }
    </style>
</head>
<body>
    <div class="deco-circle circle-1"></div>
    <div class="deco-circle circle-2"></div>

    <div class="top-bar">
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="joyoon-list.html">Filmo</a>
            <a href="board.html">자유게시판</a>
            <a href="photo-board.html" class="active">사진게시판</a>
        </div>
        <div id="authStatus"></div>
    </div>

    <div class="photo-container">
        <div class="board-header">
            <h2>PHOTO</h2>
            <a href="write.html?type=photo" class="btn-write">사진 올리기</a>
        </div>
        
        <div class="photo-grid" id="photo-list">
            <p style="grid-column: 1/-1; text-align: center; padding: 50px; color: #bbb;">소중한 추억을 불러오고 있어요... ✨</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCP4Ur--4UGGpNSK_P7qRvnVFDZbqn436A",
            authDomain: "mellow-joyoon.firebaseapp.com",
            projectId: "mellow-joyoon",
            storageBucket: "mellow-joyoon.firebasestorage.app",
            messagingSenderId: "556097417487",
            appId: "1:556097417487:web:0dca0eb26ba28d893c4e7a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadPhotos() {
            const photoList = document.getElementById("photo-list");
            try {
                // 'photos' 컬렉션에서 데이터 가져오기 (없을 시 'posts' 활용 가능)
                const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
                const snapshot = await getDocs(q);
                
                photoList.innerHTML = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    // 이미지가 있는 게시글만 표시 (임시 이미지 처리)
                    const thumb = data.thumbnail || 'https://via.placeholder.com/300?text=Mellow+Joyoon';
                    
                    photoList.innerHTML += `
                        <div class="photo-card" onclick="location.href='view.html?id=${doc.id}'">
                            <img src="${thumb}" class="photo-img" alt="post image">
                            <div class="photo-info">
                                <div class="photo-title">${data.title}</div>
                                <div class="photo-meta">
                                    <span>${data.author}</span>
                                    <span>조회 ${data.views || 0}</span>
                                </div>
                            </div>
                        </div>`;
                });
            } catch (e) {
                photoList.innerHTML = "<p>데이터를 불러오지 못했습니다.</p>";
            }
        }
        loadPhotos();
    </script>
</body>
</html>
