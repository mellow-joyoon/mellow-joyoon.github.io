<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mellow Joyoon | 사진게시판</title>
    <style>
        /* 목록 전용 스타일 */
        body { background-color: #f6f6f6; font-family: sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; }
        .post-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; text-decoration: none; color: #333; }
        .post-item:hover { background: #fffafc; }
        .thumb { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; margin-right: 15px; background: #eee; }
        .post-info h3 { margin: 0 0 5px 0; font-size: 16px; }
        .post-info p { margin: 0; font-size: 13px; color: #888; }
        .btn-write { display: inline-block; background: #d63384; color: white; padding: 10px 20px; text-decoration: none; border-radius: 8px; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📷 사진게시판</h2>
        <a href="photo-write.html" class="btn-write">글쓰기</a>
        <div id="post-list">
            <p style="text-align:center; padding:20px;">목록을 불러오는 중...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCP4Ur--4UGGpNSK_P7qRvnVFDZbqn436A",
            authDomain: "mellow-joyoon.firebaseapp.com",
            projectId: "mellow-joyoon",
            appId: "1:556097417487:web:0dca0eb26ba28d893c4e7a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadPosts() {
            const listContainer = document.getElementById("post-list");
            try {
                const q = query(collection(db, "photo_posts"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                listContainer.innerHTML = "";

                if (querySnapshot.empty) {
                    listContainer.innerHTML = "<p style='text-align:center;'>등록된 사진이 없습니다.</p>";
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const postHtml = `
                        <a href="photo-view.html?id=${doc.id}" class="post-item">
                            <img src="${data.thumbnail || 'https://via.placeholder.com/80'}" class="thumb">
                            <div class="post-info">
                                <h3>${data.title}</h3>
                                <p>${data.author} | 조회 ${data.views || 0}</p>
                            </div>
                        </a>
                    `;
                    listContainer.innerHTML += postHtml;
                });
            } catch (e) {
                listContainer.innerHTML = "목록 로드 실패: " + e.message;
            }
        }
        loadPosts();
    </script>
</body>
</html>
