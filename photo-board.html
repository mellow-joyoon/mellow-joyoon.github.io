<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mellow Joyoon | 사진 보기</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Noto+Sans+KR:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --happy-pink: #ff85a1; --bg-cream: #fffcf2; }
        body { background-color: var(--bg-cream); font-family: 'Noto Sans KR', sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .view-container { width: 100%; max-width: 800px; background: white; padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .post-header { border-bottom: 2px solid #f5f5f5; padding-bottom: 15px; margin-bottom: 20px; }
        .post-title { font-size: 24px; font-weight: 900; color: #333; margin-bottom: 10px; }
        .post-info { font-size: 14px; color: #888; display: flex; gap: 15px; }
        .post-image { width: 100%; border-radius: 20px; margin: 20px 0; display: block; }
        .post-content { line-height: 1.8; color: #444; white-space: pre-wrap; }
        .btn-list { display: inline-block; margin-top: 30px; background: #eee; color: #555; padding: 10px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="view-container">
        <div class="post-header">
            <div id="title" class="post-title">불러오는 중...</div>
            <div class="post-info">
                <span id="author"></span>
                <span id="date"></span>
            </div>
        </div>
        
        <img id="main-image" class="post-image" src="" alt="">
        
        <div id="content" class="post-content"></div>
        
        <a href="photo-board.html" class="btn-list">목록으로 돌아가기</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCP4Ur--4UGGpNSK_P7qRvnVFDZbqn436A",
            authDomain: "mellow-joyoon.firebaseapp.com",
            projectId: "mellow-joyoon",
            storageBucket: "mellow-joyoon.firebasestorage.app",
            messagingSenderId: "556097417487",
            appId: "1:556097417487:web:0dca0eb26ba28d893c4e7a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // URL에서 게시글 ID 가져오기
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        async function loadPost() {
            if (!postId) return alert("잘못된 접근입니다.");

            // ✅ 핵심: 오직 photo_posts 컬렉션에서만 문서를 찾음
            const postRef = doc(db, "photo_posts", postId);
            const postSnap = await getDoc(postRef);

            if (postSnap.exists()) {
                const data = postSnap.data();
                document.getElementById('title').innerText = data.title;
                document.getElementById('author').innerText = "작성자: " + data.author;
                document.getElementById('date').innerText = data.createdAt?.toDate().toLocaleString() || "";
                document.getElementById('main-image').src = data.imageUrl;
                document.getElementById('content').innerText = data.content;

                // 조회수 증가
                updateDoc(postRef, { views: increment(1) });
            } else {
                alert("삭제된 게시글이거나 경로가 잘못되었습니다.");
                location.href = "photo-board.html";
            }
        }

        loadPost();
    </script>
</body>
</html>
