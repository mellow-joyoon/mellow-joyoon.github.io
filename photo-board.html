<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mellow Joyoon | 사진게시판</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@700&family=Montserrat:wght@900&family=Noto+Sans+KR:wght@100;400;900&display=swap" rel="stylesheet">
    <link href="https://webfontworld.github.io/gmarket/GmarketSans.css" rel="stylesheet">

    <style>
        :root {
            --happy-pink: #ff85a1;
            --sunny-yellow: #ffde59;
            --sky-blue: #87ceeb;
            --text-main: #444;
            --bg-cream: #fffcf2;
            --card-white: rgba(255, 255, 255, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg-cream); 
            font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; 
            padding: env(safe-area-inset-top) 10px calc(20px + env(safe-area-inset-bottom));
            color: var(--text-main); 
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden; width: 100%; min-height: 100vh;
            -webkit-text-size-adjust: none;
        }

        .deco-circle { position: fixed; border-radius: 50%; z-index: -1; filter: blur(40px); opacity: 0.4; animation: pulse 6s infinite alternate; }
        .circle-1 { width: clamp(200px, 40vw, 350px); height: clamp(200px, 40vw, 350px); background: var(--happy-pink); top: -100px; left: -100px; }
        .circle-2 { width: clamp(150px, 30vw, 300px); height: clamp(150px, 30vw, 300px); background: var(--sunny-yellow); bottom: -50px; right: -50px; }

        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        .top-bar {
            width: 100%; max-width: 1000px; margin: 15px 0;
            display: flex; justify-content: space-between; align-items: center;
            background: var(--card-white); padding: 12px clamp(15px, 3vw, 25px); 
            border: 2px solid #fff; border-radius: 50px; 
            backdrop-filter: blur(10px); box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .nav-links { display: flex; gap: clamp(8px, 2vw, 15px); }
        .nav-links a { text-decoration: none; color: var(--happy-pink); font-weight: 900; font-size: clamp(12px, 3.5vw, 14px); }
        .nav-links a.active { color: #d63384; text-decoration: underline; }

        .photo-container { 
            width: 100%; max-width: 1000px; background: var(--card-white); 
            padding: clamp(15px, 4vw, 30px); 
            border: 2px solid #fff; border-radius: clamp(15px, 5vw, 30px); 
            backdrop-filter: blur(10px);
            margin-bottom: 20px;
        }
        
        .board-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .board-header h2 { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: clamp(1.5rem, 6vw, 2rem); }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(clamp(140px, 45%, 220px), 1fr));
            gap: clamp(10px, 3vw, 20px);
        }
        
        .photo-card {
            background: #fff; border-radius: 15px; overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .photo-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        
        .photo-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #eee; display: block; }
        
        .photo-info { padding: 12px; }
        .photo-title { font-size: 14px; font-weight: bold; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .photo-meta { font-size: 11px; color: #888; display: flex; justify-content: space-between; }

        .btn-write { 
            background: var(--happy-pink); color: white; padding: 10px 20px; 
            font-size: clamp(12px, 3.5vw, 14px); font-weight: 900; border-radius: 50px; text-decoration: none;
            box-shadow: 0 4px 0px #e05e7a; transition: 0.2s;
        }

        .pagination { display: flex; justify-content: center; gap: 15px; margin: 10px 0 40px; }
        .page-btn {
            background: white; border: 2px solid var(--happy-pink); color: var(--happy-pink);
            padding: 10px 20px; border-radius: 25px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="deco-circle circle-1"></div>
    <div class="top-bar">
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="joyoon-list.html">Filmo</a>
            <a href="board.html">자유게시판</a>
            <a href="photo-board.html" class="active">사진게시판</a>
        </div>
    </div>

    <div class="photo-container">
        <div class="board-header">
            <h2>PHOTO</h2>
            <a href="photo-write.html" class="btn-write">사진 올리기</a>
        </div>
        <div class="photo-grid" id="photo-list">
            <p id="loading-msg" style="grid-column: 1/-1; text-align: center; padding: 50px; color: #bbb;">불러오는 중... ✨</p>
        </div>
    </div>

    <div class="pagination">
        <button id="nextBtn" class="page-btn">더보기</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, limit, startAfter, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCP4Ur--4UGGpNSK_P7qRvnVFDZbqn436A",
            authDomain: "mellow-joyoon.firebaseapp.com",
            projectId: "mellow-joyoon",
            storageBucket: "mellow-joyoon.firebasestorage.app",
            messagingSenderId: "556097417487",
            appId: "1:556097417487:web:0dca0eb26ba28d893c4e7a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let lastVisible = null;

        const getPageSize = () => window.innerWidth <= 768 ? 4 : 6;

        // 🟢 어떤 필드명으로 저장되어도 이미지를 찾아내는 함수
        function getBestImage(data) {
            return data.imageUrl || data.url || data.image || (data.images && data.images[0]) || "https://via.placeholder.com/300?text=No+Image";
        }

        async function loadPhotos() {
            const photoList = document.getElementById("photo-list");
            const pageSize = getPageSize();
            const photoRef = collection(db, "photo_posts");
            
            try {
                // 1. 우선 인덱스 기반 정렬 시도
                let q = lastVisible 
                    ? query(photoRef, orderBy("createdAt", "desc"), startAfter(lastVisible), limit(pageSize))
                    : query(photoRef, orderBy("createdAt", "desc"), limit(pageSize));

                let snapshot;
                try {
                    snapshot = await getDocs(q);
                } catch (indexError) {
                    console.warn("인덱스 미생성 - 안전 모드로 전환");
                    // 2. 인덱스 에러 발생 시 정렬 없이 강제 로드 (무조건 보이게 함)
                    const fallbackQ = query(photoRef, limit(pageSize));
                    snapshot = await getDocs(fallbackQ);
                }

                if (snapshot.empty && !lastVisible) {
                    photoList.innerHTML = "<p style='grid-column: 1/-1; text-align: center; padding: 50px; color: #bbb;'>아직 등록된 사진이 없어요. 📸</p>";
                    return;
                }

                if (!lastVisible) photoList.innerHTML = "";
                lastVisible = snapshot.docs[snapshot.docs.length - 1];

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const card = document.createElement("div");
                    card.className = "photo-card";
                    card.onclick = () => { window.location.href = `photo-view.html?id=${doc.id}`; };
                    card.innerHTML = `
                        <img src="${getBestImage(data)}" class="photo-img" loading="lazy">
                        <div class="photo-info">
                            <div class="photo-title">${data.title || '제목 없음'}</div>
                            <div class="photo-meta"><span>${data.author || '익명'}</span></div>
                        </div>
                    `;
                    photoList.appendChild(card);
                });

            } catch (e) {
                console.error("최종 로드 실패:", e);
                photoList.innerHTML = "<p style='grid-column: 1/-1; text-align: center; color: red;'>데이터를 불러올 수 없습니다. 권한 설정을 확인해주세요.</p>";
            }
        }

        document.getElementById("nextBtn").onclick = loadPhotos;
        window.onload = loadPhotos;
    </script>
</body>
</html>
