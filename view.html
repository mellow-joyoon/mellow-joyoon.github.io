<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Mellow Joyoon | 글 보기</title>
    <style>
        body { background-color: #f6f6f6; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; padding: 20px; color: #333; }
        .view-container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border: 1px solid #ddd; }
        
        /* 카페 본문 헤더 */
        .post-header { border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 20px; }
        .post-category { color: #d63384; font-size: 13px; font-weight: bold; margin-bottom: 8px; }
        .post-title { font-size: 22px; font-weight: bold; margin-bottom: 15px; }
        .post-info { display: flex; align-items: center; font-size: 12px; color: #999; }
        .post-info .author { color: #333; font-weight: bold; margin-right: 15px; }
        .post-info span { margin-right: 10px; }

        /* 본문 내용 */
        .post-content { line-height: 1.8; font-size: 15px; min-height: 300px; white-space: pre-wrap; padding: 10px 0; }

        /* 하단 조회수/좋아요 영역 */
        .post-footer { border-top: 1px solid #eee; padding-top: 20px; margin-top: 40px; display: flex; justify-content: space-between; align-items: center; }
        .stat-area { font-size: 13px; color: #666; }
        .btn-like { background: none; border: 1px solid #eee; padding: 5px 12px; cursor: pointer; border-radius: 15px; font-size: 13px; transition: 0.2s; }
        .btn-like:hover { background: #fff0f3; border-color: #d63384; color: #d63384; }

        .btn-list { background: #fff; border: 1px solid #ccc; color: #333; padding: 7px 15px; text-decoration: none; font-size: 13px; }
    </style>
</head>
<body>
    <div class="view-container">
        <div id="loading">내용을 불러오는 중입니다...</div>
        <div id="post-detail" style="display:none;">
            <div class="post-header">
                <div class="post-category">자유게시판</div>
                <div class="post-title" id="title"></div>
                <div class="post-info">
                    <span class="author" id="author"></span>
                    <span id="date"></span>
                    <span>조회 <b id="viewCount">0</b></span>
                </div>
            </div>
            
            <div class="post-content" id="content"></div>

            <div class="post-footer">
                <div class="stat-area">
                    <button class="btn-like" id="likeBtn">❤️ 좋아요 <span id="likeCount">0</span></button>
                </div>
                <a href="board.html" class="btn-list">목록보기</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCP4Ur--4UGGpNSK_P7qRvnVFDZbqn436A",
          authDomain: "mellow-joyoon.firebaseapp.com",
          projectId: "mellow-joyoon",
          storageBucket: "mellow-joyoon.firebasestorage.app",
          messagingSenderId: "556097417487",
          appId: "1:556097417487:web:0dca0eb26ba28d893c4e7a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        if (postId) {
            const postRef = doc(db, "posts", postId);
            
            // 데이터 가져오기
            getDoc(postRef).then((docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById("title").innerText = data.title;
                    document.getElementById("author").innerText = data.author;
                    document.getElementById("content").innerText = data.content;
                    document.getElementById("viewCount").innerText = data.views || 0;
                    document.getElementById("likeCount").innerText = data.likes || 0;
                    document.getElementById("date").innerText = data.createdAt ? new Date(data.createdAt.seconds * 1000).toLocaleString() : "-";
                    
                    document.getElementById("loading").style.display = "none";
                    document.getElementById("post-detail").style.display = "block";
                }
            });

            // 좋아요 버튼 클릭 이벤트
            document.getElementById("likeBtn").addEventListener("click", async () => {
                await updateDoc(postRef, {
                    likes: increment(1)
                });
                // 화면의 숫자도 바로 올리기
                const countSpan = document.getElementById("likeCount");
                countSpan.innerText = parseInt(countSpan.innerText) + 1;
                alert("이 글을 좋아합니다! ❤️");
            });
        }
    </script>
</body>
</html>
