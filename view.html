<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Mellow Joyoon | 글 보기</title>
    <style>
        body { background-color: #f6f6f6; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; padding: 20px; color: #333; }
        .view-container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border: 1px solid #ddd; }
        
        /* 네이버 카페 본문 상단 스타일 */
        .post-header { border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .post-category { color: #d63384; font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        .post-title { font-size: 24px; font-weight: bold; margin-bottom: 15px; }
        .post-info { display: flex; align-items: center; font-size: 12px; color: #999; }
        .post-info .author { color: #333; font-weight: bold; margin-right: 15px; }
        .post-info span { margin-right: 10px; }

        /* 본문 내용 영역 */
        .post-content { line-height: 1.8; font-size: 15px; min-height: 350px; white-space: pre-wrap; padding: 20px 0; border-bottom: 1px solid #eee; }

        /* 하단 통계 및 버튼 */
        .post-footer { padding-top: 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn-like { background: #fff; border: 1px solid #eee; padding: 10px 20px; cursor: pointer; border-radius: 25px; font-size: 14px; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .btn-like:hover { background: #fff0f3; border-color: #d63384; color: #d63384; }
        .btn-like.active { background: #fff0f3; border-color: #d63384; color: #d63384; font-weight: bold; }
        
        .btn-list { background: #fff; border: 1px solid #ccc; color: #333; padding: 8px 18px; text-decoration: none; font-size: 13px; border-radius: 2px; }
        .btn-list:hover { background: #f9f9f9; }
    </style>
</head>
<body>
    <div class="view-container">
        <div id="loading" style="text-align:center; padding:50px;">카페 글을 불러오는 중입니다...</div>
        
        <div id="post-detail" style="display:none;">
            <div class="post-header">
                <div class="post-category">자유게시판</div>
                <h1 class="post-title" id="title"></h1>
                <div class="post-info">
                    <span class="author" id="author"></span>
                    <span id="date"></span>
                    <span>조회 <b id="viewCount">0</b></span>
                </div>
            </div>
            
            <div class="post-content" id="content"></div>

            <div class="post-footer">
                <div>
                    <button class="btn-like" id="likeBtn">❤️ 좋아요 <span id="likeCount">0</span></button>
                </div>
                <a href="board.html" class="btn-list">목록보기</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCP4Ur--4UGGpNSK_P7qRvnVFDZbqn436A",
          authDomain: "mellow-joyoon.firebaseapp.com",
          projectId: "mellow-joyoon",
          storageBucket: "mellow-joyoon.firebasestorage.app",
          messagingSenderId: "556097417487",
          appId: "1:556097417487:web:0dca0eb26ba28d893c4e7a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        if (postId) {
            const postRef = doc(db, "posts", postId);
            
            // 1. 페이지 접속 시 조회수 즉시 증가
            async function initPost() {
                try {
                    // 조회수 1 증가 (서버 업데이트)
                    await updateDoc(postRef, {
                        views: increment(1)
                    });

                    // 데이터 가져와서 화면에 그리기
                    const docSnap = await getDoc(postRef);
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        document.getElementById("title").innerText = data.title;
                        document.getElementById("author").innerText = data.author;
                        document.getElementById("content").innerText = data.content;
                        document.getElementById("viewCount").innerText = data.views || 0;
                        document.getElementById("likeCount").innerText = data.likes || 0;
                        
                        // 날짜 예쁘게 변환
                        const dateObj = data.createdAt ? new Date(data.createdAt.seconds * 1000) : new Date();
                        document.getElementById("date").innerText = dateObj.toLocaleString();

                        // 로딩 숨기고 본문 표시
                        document.getElementById("loading").style.display = "none";
                        document.getElementById("post-detail").style.display = "block";
                    } else {
                        alert("삭제된 게시글이거나 존재하지 않습니다.");
                        location.href = 'board.html';
                    }
                } catch (error) {
                    console.error("데이터 로딩 중 에러:", error);
                }
            }

            initPost();

            // 2. 좋아요 버튼 클릭 이벤트
            document.getElementById("likeBtn").addEventListener("click", async () => {
                try {
                    await updateDoc(postRef, {
                        likes: increment(1)
                    });
                    
                    // 화면 숫자 즉시 반영
                    const likeSpan = document.getElementById("likeCount");
                    likeSpan.innerText = parseInt(likeSpan.innerText) + 1;
                    
                    document.getElementById("likeBtn").classList.add("active");
                    alert("이 글을 좋아합니다! ❤️");
                } catch (e) {
                    console.error("좋아요 업데이트 실패:", e);
                }
            });
        } else {
            location.href = 'board.html';
        }
    </script>
</body>
</html>
