<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mellow Joyoon | 팬 회원가입</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* ✅ 기존 디자인 스타일 유지 및 반응형 보강 */
        body { 
            background-color: #f6f6f6; 
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        .signup-container { 
            background: white; 
            padding: 40px 30px; 
            border: 1px solid #ddd; 
            width: 100%;
            max-width: 380px; /* 기존 350px 기반에서 반응형 여유분 포함 */
            text-align: center; 
            box-sizing: border-box;
            border-radius: 8px; /* 글쓰기 페이지와 통일감 부여 */
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h2 { 
            color: #d63384; 
            margin-bottom: 30px; 
            font-size: 1.6rem;
            font-weight: 900;
        }

        input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px; 
            border: 1px solid #ccc; 
            box-sizing: border-box; 
            font-size: 16px; /* 모바일 사파리 자동 줌 방지 */
            border-radius: 4px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #d63384;
        }

        .btn-signup { 
            width: 100%; 
            background: #d63384; 
            color: white; 
            border: none; 
            padding: 14px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 15px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .btn-signup:hover { 
            background: #c12a74; 
        }

        .btn-signup:disabled {
            background: #edaecb;
            cursor: not-allowed;
        }

        .login-link { 
            margin-top: 20px; 
            font-size: 13px; 
            color: #666; 
        }

        .login-link a { 
            color: #d63384; 
            text-decoration: none; 
            font-weight: bold;
        }

        /* ✅ 모바일 및 태블릿 반응형 대응 */
        @media (max-width: 480px) {
            .signup-container {
                padding: 30px 20px;
                border: none; /* 모바일에서는 테두리보다 깔끔하게 */
                background: transparent;
                box-shadow: none;
            }
            body {
                background-color: white; /* 모바일 몰입감 */
            }
        }
    </style>
</head>
<body>

    <div class="signup-container">
        <h2>팬 회원가입</h2>
        <input type="email" id="email" placeholder="이메일 주소" autocomplete="email">
        <input type="password" id="password" placeholder="비밀번호 (6자 이상)" autocomplete="new-password">
        <input type="text" id="nickname" placeholder="사용할 닉네임" autocomplete="off">
        <button class="btn-signup" id="signupBtn">가입하기</button>
        
        <div class="login-link">
            이미 계정이 있으신가요? <a href="login.html">로그인하기</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // 파이어베이스 설정 (기존 정보 유지)
        const firebaseConfig = {
          apiKey: "AIzaSyCP4Ur--4UGGpNSK_P7qRvnVFDZbqn436A",
          authDomain: "mellow-joyoon.firebaseapp.com",
          projectId: "mellow-joyoon",
          storageBucket: "mellow-joyoon.firebasestorage.app",
          messagingSenderId: "556097417487",
          appId: "1:556097417487:web:0dca0eb26ba28d893c4e7a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const signupBtn = document.getElementById("signupBtn");

        signupBtn.addEventListener("click", async () => {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const nickname = document.getElementById("nickname").value.trim();

            if (!email || !password || !nickname) {
                alert("모든 정보를 입력해주세요! 😊");
                return;
            }

            if (password.length < 6) {
                alert("비밀번호를 6자 이상 입력해주세요.");
                return;
            }

            signupBtn.disabled = true;
            signupBtn.innerText = "가입 처리 중...";

            try {
                // 1. 회원가입 진행
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                
                // 2. 닉네임(displayName) 설정
                await updateProfile(userCredential.user, {
                    displayName: nickname
                });
                
                alert("🎉 조윤 배우님 팬으로 가입되셨습니다! 로그인을 진행해주세요.");
                location.href = "login.html";
            } catch (error) {
                console.error(error);
                let message = "가입 중 오류가 발생했어요.";
                if (error.code === 'auth/email-already-in-use') {
                    message = "이미 사용 중인 이메일입니다.";
                } else if (error.code === 'auth/invalid-email') {
                    message = "유효하지 않은 이메일 형식입니다.";
                }
                alert(message + "\n(" + error.message + ")");
                signupBtn.disabled = false;
                signupBtn.innerText = "가입하기";
            }
        });

        // 엔터 키 입력 시 가입하기 실행
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') signupBtn.click();
        });
    </script>
</body>
</html>
