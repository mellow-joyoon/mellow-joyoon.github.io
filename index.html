<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mellow Joyoon | 배우 조윤 팬페이지</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Noto+Sans+KR:wght@100;400;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --point-color: #ff2d55;
            --sub-color: #ffdce3;
            --text-dark: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #fff;
            font-family: 'Noto Sans KR', sans-serif;
        }

        /* 📱 배경 장식: 불규칙한 원형 그라데이션 */
        .bg-deco {
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, var(--sub-color) 0%, rgba(255,255,255,0) 70%);
            top: -200px; right: -100px;
            z-index: 0;
            filter: blur(50px);
            animation: moveDeco 15s infinite alternate;
        }

        @keyframes moveDeco {
            from { transform: translate(0, 0); }
            to { transform: translate(-100px, 100px); }
        }

        .wrapper {
            position: relative;
            z-index: 10;
            width: 100%; height: 100%;
            display: flex;
            padding: 5% 8%; /* 좌우 여백을 넓게 주어 비대칭 강조 */
            align-items: center;
        }

        /* 📱 PC: 왼쪽 텍스트 배치 / 모바일: 상단 배치 */
        .content-left {
            flex: 1;
            text-align: left;
            animation: slideInLeft 1s ease-out;
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .main-name {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(4rem, 12vw, 8rem);
            font-weight: 900;
            color: var(--text-dark);
            line-height: 0.85;
            letter-spacing: -4px;
            margin-bottom: 20px;
        }

        .main-name span {
            color: var(--point-color);
            display: block;
            padding-left: 20px;
        }

        .desc-text {
            font-size: 1.1rem;
            color: #666;
            line-height: 1.8;
            font-weight: 300;
            margin-bottom: 40px;
            border-left: 3px solid var(--point-color);
            padding-left: 20px;
        }

        /* 📱 PC: 오른쪽 이미지 배치 / 모바일: 중앙 하단 */
        .content-right {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            position: relative;
        }

        .image-frame {
            width: 80%;
            max-width: 450px;
            aspect-ratio: 3 / 4;
            background: #f0f0f0;
            border-radius: 5px;
            position: relative;
            box-shadow: 40px 40px 0px var(--sub-color); /* 비대칭 포인트 박스 */
            overflow: hidden;
            transition: 0.5s;
        }

        .image-frame:hover {
            transform: translate(10px, 10px);
            box-shadow: 20px 20px 0px var(--sub-color);
        }

        .image-frame img { width: 100%; height: 100%; object-fit: cover; }

        /* 📱 흩뿌려진 조각 글자들 */
        .floating-tag {
            position: absolute;
            background: var(--text-dark);
            color: #fff;
            padding: 8px 15px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            top: 20%; right: 70%;
            transform: rotate(-15deg);
            z-index: 20;
        }

        /* 📱 입장 버튼: 하단 고정 느낌 탈피 */
        .btn-entry {
            display: inline-block;
            padding: 15px 40px;
            background: var(--point-color);
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            border-radius: 0 30px 30px 30px; /* 독특한 모양 */
            box-shadow: 0 10px 20px rgba(255, 45, 85, 0.2);
            transition: 0.3s;
        }

        .btn-entry:hover {
            background: #000;
            transform: scale(1.1);
        }

        .copyright-area {
            position: absolute;
            bottom: 30px;
            left: 8%;
            font-size: 0.75rem;
            color: #ccc;
            text-transform: uppercase;
        }

        /* 📱 모바일 반응형: 수직 구조로 변경 */
        @media (max-width: 900px) {
            .wrapper {
                flex-direction: column;
                justify-content: center;
                padding: 40px 25px;
            }
            .content-left {
                flex: none; width: 100%; margin-bottom: 50px;
                text-align: center;
            }
            .main-name { font-size: 5rem; letter-spacing: -2px; }
            .main-name span { padding-left: 0; }
            .desc-text { border-left: none; padding-left: 0; }
            .content-right { flex: none; width: 100%; justify-content: center; }
            .image-frame { width: 70%; box-shadow: 20px 20px 0px var(--sub-color); }
            .floating-tag { right: auto; left: 10%; top: 10%; }
            .copyright-area { left: 0; width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="bg-deco"></div>

    <div class="wrapper">
        <div class="content-left">
            <h1 class="main-name">
                JO<br><span>YOON</span>
            </h1>
            <p class="desc-text">
                어제보다 오늘 더 빛나는,<br>배우 조윤의 모든 멜로우 모먼트.
            </p>
            <a href="board.html" class="btn-entry">ENTER GALLERY →</a>
        </div>

        <div class="content-right">
            <div class="floating-tag">ACTRESS</div>
            <div class="image-frame">
                <div style="height:100%; display:flex; align-items:center; justify-content:center; color:#ddd; font-weight:900;">PHOTO</div>
            </div>
        </div>
    </div>

    <div class="copyright-area">
        Copyright © Mellow Joyoon. All rights reserved.
    </div>

    <script>
        // 마우스 커서 위치에 따라 조명이 따라오는 느낌의 효과
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            const deco = document.querySelector('.bg-deco');
            deco.style.left = (x - 300) + 'px';
            deco.style.top = (y - 300) + 'px';
        });
    </script>
</body>
</html>
