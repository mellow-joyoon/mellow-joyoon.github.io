<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mellow Joyoon | 배우 조윤 팬페이지</title>
    <style>
        /* 팬페이지 디자인 설정 */
        body {
            background-color: #fdf2f4; /* 부드러운 분홍색 배경 */
            color: #333;
            font-family: 'Apple SD Gothic Neo', 'Nanum Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            color: #d63384; /* 강조 포인트 색상 */
            margin-bottom: 10px;
        }
        p {
            font-size: 1.2rem;
            opacity: 0.8;
        }
        .profile-box {
            width: 300px;
            height: 300px;
            background-color: #fff;
            border-radius: 50%; /* 동그란 이미지 틀 */
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 5px solid #fff;
        }
        .profile-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <h1>Mellow Joyoon</h1>
    <p>배우 조윤님의 모든 순간을 기록하는 공간입니다.</p>

    <div class="profile-box">
        <p style="font-size: 0.9rem; color: #999;">여기에 배우님 사진을<br>넣어볼까요?</p>
    </div>

    <p style="font-size: 1rem; color: #d63384;">현재 페이지 꾸미기 진행 중 ✨</p>

</body>
</html>
