<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mellow Joyoon | 배우 조윤 팬페이지</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Montserrat:wght@900&family=Noto+Sans+KR:wght@100;400;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --main-pink: #ff2d55;
            --bg-light: #fff;
            --text-dark: #111;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--bg-light);
            font-family: 'Noto Sans KR', sans-serif;
        }

        /* 📱 PC 양옆 휑함을 해결하는 배경 반복 텍스트 패턴 */
        .bg-pattern {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: space-around;
            opacity: 0.03; /* 아주 연하게 배경처럼 */
            z-index: 0;
            user-select: none;
        }

        .pattern-row {
            font-family: 'Syncopate', sans-serif;
            font-size: 8vw;
            white-space: nowrap;
            line-height: 1;
        }

        /* 📱 메인 컨테이너 */
        .main-wrapper {
            position: relative;
            z-index: 10;
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-start; /* 왼쪽 정렬로 비대칭 시작 */
            padding: 0 10%;
        }

        .content-box {
            position: relative;
            width: 100%;
            max-width: 1200px;
            display: flex;
            align-items: flex-end;
        }

        /* 📱 브랜드 이름 (작게) */
        .mellow-label {
            position: absolute;
            top: -50px; left: 0;
            font-family: 'Syncopate', sans-serif;
            font-size: 1.2rem;
            color: var(--main-pink);
            letter-spacing: 10px;
            text-transform: uppercase;
        }

        /* 📱 배우 성함 (가장 크게, 주인공) */
        .actor-title {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(5rem, 18vw, 15rem);
            font-weight: 900;
            color: var(--text-dark);
            line-height: 0.8;
            letter-spacing: -10px;
            z-index: 2;
            pointer-events: none;
        }

        /* 📱 이미지 배치 (PC에서 오른쪽 여백을 채움) */
        .image-visual {
            position: absolute;
            right: 0; bottom: 10%;
            width: 30vw; height: 60vh;
            background: #eee;
            z-index: 1;
            box-shadow: 0 50px 100px rgba(255, 45, 85, 0.1);
            overflow: hidden;
            border-radius: 10px;
            transform: rotate(3deg); /* 살짝 비틀어 역동성 부여 */
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .image-visual img { width: 100%; height: 100%; object-fit: cover; }
        .image-visual:hover { transform: rotate(0deg) scale(1.05); z-index: 5; }

        /* 📱 입장 버튼 */
        .entry-section {
            position: absolute;
            right: 0; top: 0;
            text-align: right;
        }

        .btn-link {
            display: inline-block;
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 900;
            font-size: 1.5rem;
            border-bottom: 5px solid var(--main-pink);
            padding-bottom: 5px;
            transition: 0.3s;
        }

        .btn-link:hover {
            color: var(--main-pink);
            transform: translateX(-10px);
        }

        /* 저작권 문구 유지 */
        .copyright {
            position: absolute;
            bottom: 40px;
            left: 10%;
            font-size: 0.75rem;
            color: #ddd;
            letter-spacing: 2px;
        }

        /* 📱 모바일/태블릿 반응형 */
        @media (max-width: 1024px) {
            .main-wrapper { padding: 0 40px; justify-content: center; }
            .content-box { flex-direction: column; align-items: center; text-align: center; }
            .actor-title { font-size: 6rem; letter-spacing: -2px; margin-top: 50px; }
            .image-visual { position: relative; right: auto; bottom: auto; width: 80%; height: 40vh; margin: 30px 0; transform: none; }
            .entry-section { position: relative; top: auto; right: auto; text-align: center; }
            .mellow-label { left: 50%; transform: translateX(-50%); top: -30px; }
            .bg-pattern { display: none; }
        }

        @media (max-width: 480px) {
            .actor-title { font-size: 4rem; }
        }
    </style>
</head>
<body>

    <div class="bg-pattern">
        <div class="pattern-row">JO YOON JO YOON JO YOON JO YOON</div>
        <div class="pattern-row" style="padding-left: 10%">JO YOON JO YOON JO YOON JO YOON</div>
        <div class="pattern-row" style="padding-left: 5%">JO YOON JO YOON JO YOON JO YOON</div>
        <div class="pattern-row">JO YOON JO YOON JO YOON JO YOON</div>
    </div>

    <div class="main-wrapper">
        <div class="content-box">
            <div class="mellow-label">Mellow</div>

            <h1 class="actor-title">JO<br>YOON</h1>

            <div class="image-visual">
                <div style="height:100%; display:flex; align-items:center; justify-content:center; color:#ccc; font-weight:900;">PHOTO</div>
            </div>

            <div class="entry-section">
                <a href="board.html" class="btn-link">ENTER VIEW →</a>
            </div>
        </div>
    </div>

    <p class="copyright">Copyright © Mellow Joyoon. All rights reserved.</p>

    <script>
        // 마우스 움직임에 따라 배경 패턴이 미세하게 움직이는 효과
        document.addEventListener('mousemove', (e) => {
            const rows = document.querySelectorAll('.pattern-row');
            const x = (e.clientX - window.innerWidth / 2) / 50;
            rows.forEach((row, index) => {
                const speed = (index + 1) * 0.5;
                row.style.transform = `translateX(${x * speed}px)`;
            });
        });
    </script>
</body>
</html>
