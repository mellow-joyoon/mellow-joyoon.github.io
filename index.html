<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mellow Joyoon | 배우 조윤 팬페이지</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@700&family=Montserrat:wght@900&family=Noto+Sans+KR:wght@100;400;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --happy-pink: #ff85a1;
            --sunny-yellow: #ffde59;
            --sky-blue: #87ceeb;
            --text-main: #444; /* 너무 검지 않은 부드러운 회색 */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #fffcf2; /* 따뜻한 느낌의 크림색 */
            font-family: 'Noto Sans KR', sans-serif;
        }

        /* 📱 PC 여백을 채우는 생기발랄한 배경 오브제 */
        .deco-circle {
            position: absolute;
            border-radius: 50%;
            z-index: 1;
            filter: blur(40px);
            opacity: 0.5;
            animation: pulse 6s infinite alternate;
        }
        .circle-1 { width: 400px; height: 400px; background: var(--happy-pink); top: -100px; left: -100px; }
        .circle-2 { width: 300px; height: 300px; background: var(--sunny-yellow); bottom: -50px; right: -50px; animation-delay: 1s; }
        .circle-3 { width: 250px; height: 250px; background: var(--sky-blue); top: 20%; right: 10%; animation-delay: 2s; }

        @keyframes pulse { from { transform: scale(1); opacity: 0.4; } to { transform: scale(1.2); opacity: 0.6; } }

        .main-container {
            position: relative;
            z-index: 10;
            width: 100%; height: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
            padding: 0 8%;
        }

        /* 📱 왼쪽: 배우 이름과 로고 */
        .content-text {
            text-align: left;
            animation: popUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .mellow-logo {
            font-family: 'Gaegu', cursive;
            font-size: 1.5rem;
            color: var(--happy-pink);
            margin-bottom: 5px;
            display: inline-block;
            transform: rotate(-5deg);
        }

        .actor-name {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(4rem, 12vw, 9rem);
            font-weight: 900;
            color: var(--text-main);
            line-height: 0.85;
            letter-spacing: -2px;
            margin-bottom: 30px;
        }

        .actor-name span { color: var(--happy-pink); }

        .intro-text {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 40px;
            font-weight: 400;
            line-height: 1.6;
        }

        /* 📱 오른쪽: 사진 카드 (기존 디자인 및 반응형 유지) */
        .content-visual {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .photo-card {
            width: 320px;
            height: 420px;
            background: #fff;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 20px 20px 0px var(--sunny-yellow);
            transform: rotate(5deg);
            transition: 0.4s;
            overflow: hidden;
        }

        .photo-card:hover {
            transform: rotate(0deg) translateY(-10px);
            box-shadow: 10px 10px 0px var(--happy-pink);
        }

        /* 이미지 설정: 사진이 틀에 꽉 차게 고정 */
        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }

        /* 📱 입장 버튼: 귀여운 젤리 스타일 */
        .btn-entry {
            display: inline-block;
            padding: 18px 50px;
            background: var(--happy-pink);
            color: #fff;
            text-decoration: none;
            font-weight: 900;
            font-size: 1.2rem;
            border-radius: 50px;
            box-shadow: 0 10px 0px #e05e7a;
            transition: 0.2s;
        }

        .btn-entry:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0px #e05e7a;
        }

        /* 저작권 문구 유지 */
        .copyright {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 0.75rem;
            color: #bbb;
            letter-spacing: 1px;
        }

        @keyframes popUp { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

        /* 📱 모바일 및 태블릿 모든 기기 대응 반응형 코드 */
        @media (max-width: 1024px) {
            .main-container { grid-template-columns: 1fr; padding-top: 50px; }
            .content-text { text-align: center; margin-bottom: 60px; }
            .photo-card { width: 260px; height: 340px; }
            .deco-circle { width: 200px; height: 200px; }
        }
    </style>
</head>
<body>

    <div class="deco-circle circle-1"></div>
    <div class="deco-circle circle-2"></div>
    <div class="deco-circle circle-3"></div>

    <div class="main-container">
        <div class="content-text">
            <span class="mellow-logo">Mellow ♪</span>
            <h1 class="actor-name">JO<br><span>YOON</span></h1>
            <p class="intro-text">웃음 가득한 조윤 배우님의<br>행복한 순간들을 기록해요 ✨</p>
            <a href="board.html" class="btn-entry">놀러가기 ➔</a>
        </div>

        <div class="content-visual">
            <div class="photo-card">
                <img src="joyoon_main3.jpg" alt="배우 조윤님 메인 사진">
            </div>
        </div>
    </div>

    <p class="copyright">Copyright © Mellow Joyoon. All rights reserved.</p>

    <script>
        // 마우스를 따라 배경 구슬들이 미세하게 도망다니는 효과 유지
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            const c1 = document.querySelector('.circle-1');
            const c2 = document.querySelector('.circle-2');
            const c3 = document.querySelector('.circle-3');
            
            if(c1) c1.style.transform = `translate(${x * 50}px, ${y * 50}px)`;
            if(c2) c2.style.transform = `translate(${-x * 30}px, ${-y * 30}px)`;
            if(c3) c3.style.transform = `translate(${x * 40}px, ${-y * 40}px)`;
        });
    </script>
</body>
</html>
