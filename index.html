<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mellow Joyoon | 배우 조윤 팬페이지</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Pretendard:wght@300;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --point-pink: #ff2d55;
            --soft-pink: #ffe3e8;
            --bg-white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--bg-white);
            font-family: 'Pretendard', sans-serif;
        }

        /* 📱 배경에서 흐르는 텍스트 (Marquee) */
        .scrolling-text {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            white-space: nowrap;
            font-family: 'Montserrat', sans-serif;
            font-size: 15vh;
            font-weight: 900;
            color: rgba(255, 45, 85, 0.05); /* 아주 연하게 배경처럼 */
            z-index: 1;
            pointer-events: none;
        }

        .scroll-content {
            display: inline-block;
            animation: scrollText 20s linear infinite;
        }

        @keyframes scrollText {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* 📱 중앙 메인 콘텐츠 박스 */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .main-visual {
            position: relative;
            width: 280px;
            height: 380px;
            margin-bottom: 30px;
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .photo-frame {
            width: 100%;
            height: 100%;
            background: #eee;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(255, 45, 85, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }

        /* 📱 글자가 고정되지 않고 흩어지는 효과 */
        .text-overlay {
            position: absolute;
            top: -20px;
            right: -30px;
            background: var(--point-pink);
            color: white;
            padding: 10px 20px;
            font-weight: 900;
            transform: rotate(5deg);
            box-shadow: 10px 10px 20px rgba(255, 45, 85, 0.2);
            font-size: 1.2rem;
        }

        .title-group { text-align: center; margin-bottom: 40px; }

        .main-title {
            font-size: clamp(2.5rem, 10vw, 4rem);
            font-weight: 900;
            color: #222;
            letter-spacing: -2px;
            margin-bottom: 5px;
        }

        .sub-title {
            font-size: 1rem;
            color: var(--point-pink);
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        /* 📱 버튼 디자인: 마우스를 올리면 반응 */
        .enter-btn {
            position: relative;
            padding: 18px 60px;
            background: #222;
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            border-radius: 5px;
            overflow: hidden;
            transition: 0.3s;
        }

        .enter-btn:hover { background: var(--point-pink); transform: scale(1.05); }

        .copyright {
            position: absolute;
            bottom: 30px;
            font-size: 0.75rem;
            color: #aaa;
            letter-spacing: 1px;
        }

        /* 반응형 모바일 최적화 */
        @media (max-width: 480px) {
            .main-visual { width: 220px; height: 300px; }
            .scrolling-text { font-size: 10vh; }
        }
    </style>
</head>
<body>

    <div class="scrolling-text">
        <div class="scroll-content">
            MELLOW JOY OON MELLOW JOY OON MELLOW JOY OON MELLOW JOY OON MELLOW JOY OON&nbsp;
        </div>
        <div class="scroll-content">
            MELLOW JOY OON MELLOW JOY OON MELLOW JOY OON MELLOW JOY OON MELLOW JOY OON&nbsp;
        </div>
    </div>

    <div class="container">
        <div class="main-visual">
            <div class="photo-frame">
                <div style="display:flex; height:100%; align-items:center; justify-content:center; color:#ccc;">PHOTO AREA</div>
            </div>
            <div class="text-overlay">JOY OON MOMENT</div>
        </div>

        <div class="title-group">
            <h1 class="main-title">MELLOW</h1>
            <p class="sub-title">Actress Jo Yoon</p>
        </div>

        <a href="board.html" class="enter-btn">ENTER BOARD</a>

        <p class="copyright">Copyright © Mellow Joyoon. All rights reserved.</p>
    </div>

    <script>
        // 마우스 움직임에 따라 메인 이미지가 살짝 반응하는 효과
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) / 50;
            const moveY = (e.clientY - window.innerHeight / 2) / 50;
            const visual = document.querySelector('.main-visual');
            visual.style.transform = `translate(${moveX}px, ${moveY}px) translateY(${Math.sin(Date.now()/1000)*10}px)`;
        });
    </script>
</body>
</html>
