<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mellow Joyoon | 배우 조윤 팬페이지</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@700&family=Montserrat:wght@900&family=Noto+Sans+KR:wght@100;400;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --happy-pink: #ff85a1;
            --sunny-yellow: #ffde59;
            --sky-blue: #87ceeb;
            --text-main: #444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #fffcf2; /* 따뜻하고 밝은 크림색 */
            font-family: 'Noto Sans KR', sans-serif;
        }

        /* 📱 PC 여백을 채우는 생기발랄한 배경 오브제 (휑함 방지) */
        .deco-circle {
            position: absolute;
            border-radius: 50%;
            z-index: 1;
            filter: blur(40px);
            opacity: 0.5;
            animation: pulse 6s infinite alternate;
        }
        .circle-1 { width: 450px; height: 450px; background: var(--happy-pink); top: -150px; left: -100px; }
        .circle-2 { width: 350px; height: 350px; background: var(--sunny-yellow); bottom: -80px; right: -50px; animation-delay: 1s; }
        .circle-3 { width: 300px; height: 300px; background: var(--sky-blue); top: 15%; right: 5%; animation-delay: 2s; }

        @keyframes pulse { from { transform: scale(1); opacity: 0.4; } to { transform: scale(1.15); opacity: 0.55; } }

        .main-container {
            position: relative;
            z-index: 10;
            width: 100%; height: 100%;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            align-items: center;
            padding: 0 10%;
        }

        /* 📱 왼쪽: 배우 이름과 로고 영역 */
        .content-text {
            text-align: left;
            animation: popUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .mellow-logo {
            font-family: 'Gaegu', cursive;
            font-size: 1.6rem;
            color: var(--happy-pink);
            margin-bottom: 5px;
            display: inline-block;
            transform: rotate(-5deg);
        }

        .actor-name {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(4.5rem, 13vw, 10rem);
            font-weight: 900;
            color: var(--text-main);
            line-height: 0.85;
            letter-spacing: -3px;
            margin-bottom: 35px;
        }

        .actor-name span { color: var(--happy-pink); }

        .intro-text {
            font-size: 1.25rem;
            color: #555;
            margin-bottom: 45px;
            font-weight: 400;
            line-height: 1.6;
            word-break: keep-all;
        }

        /* 📱 오른쪽: 사진 카드 (역동적 디자인) */
        .content-visual {
            position: relative;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .photo-card {
            width: 340px;
            height: 460px;
            background: #fff;
            padding: 18px;
            border-radius: 25px;
            box-shadow: 25px 25px 0px var(--sunny-yellow);
            transform: rotate(4deg);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .photo-card:hover {
            transform: rotate(0deg) translateY(-15px) scale(1.02);
            box-shadow: 15px 15px 0px var(--happy-pink);
        }

        .photo-card img {
            width: 100%; height: 100%;
            object-fit: cover;
            border-radius: 15px;
        }

        /* 📱 입장 버튼: 젤리 팝 스타일 */
        .btn-entry {
            display: inline-block;
            padding: 20px 60px;
            background: var(--happy-pink);
            color: #fff;
            text-decoration: none;
            font-weight: 900;
            font-size: 1.3rem;
            border-radius: 60px;
            box-shadow: 0 10px 0px #e05e7a;
            transition: 0.2s;
            letter-spacing: 1px;
        }

        .btn-entry:hover {
            background: #ff6b8e;
            transform: translateY(-3px);
            box-shadow: 0 13px 0px #e05e7a;
        }

        .btn-entry:active {
            transform: translateY(7px);
            box-shadow: 0 3px 0px #e05e7a;
        }

        /* 저작권 문구 유지 */
        .copyright {
            position: absolute;
            bottom: 35px;
            width: 100%;
            text-align: center;
            font-size: 0.75rem;
            color: #bbb;
            letter-spacing: 1.5px;
            font-weight: 500;
        }

        @keyframes popUp { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        /* 📱 모든 기기 반응형 최적화 */
        @media (max-width: 1024px) {
            .main-container { grid-template-columns: 1fr; padding-top: 60px; }
            .content-text { text-align: center; margin-bottom: 70px; }
            .content-visual { justify-content: center; }
            .photo-card { width: 280px; height: 380px; }
            .deco-circle { width: 250px; height: 250px; }
        }

        @media (max-width: 480px) {
            .actor-name { font-size: 5rem; }
            .intro-text { font-size: 1.1rem; }
            .photo-card { width: 85%; height: auto; aspect-ratio: 3/4; }
        }
    </style>
</head>
<body>

    <div class="deco-circle circle-1"></div>
    <div class="deco-circle circle-2"></div>
    <div class="deco-circle circle-3"></div>

    <div class="main-container">
        <div class="content-text">
            <span class="mellow-logo">Mellow ♪</span>
            <h1 class="actor-name">JO<br><span>YOON</span></h1>
            <p class="intro-text">웃음 가득한 조윤 배우님의<br>행복한 순간들을 기록해요 ✨</p>
            <a href="board.html" class="btn-entry">ENTER GALLERY ➔</a>
        </div>

        <div class="content-visual">
            <div class="photo-card">
                <div style="height:100%; background:#f9f9f9; display:flex; align-items:center; justify-content:center; color:var(--happy-pink); font-size:1.5rem; font-weight:900; text-align:center; padding:20px;">JO YOON<br>PHOTO ✨</div>
            </div>
        </div>
    </div>

    <p class="copyright">Copyright © Mellow Joyoon. All rights reserved.</p>

    <script>
        // PC 환경에서 마우스 움직임에 따라 배경 구슬들이 반응 (생동감 부여)
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            const c1 = document.querySelector('.circle-1');
            const c2 = document.querySelector('.circle-2');
            const c3 = document.querySelector('.circle-3');
            
            if(c1) c1.style.transform = `translate(${x * 60}px, ${y * 60}px)`;
            if(c2) c2.style.transform = `translate(${-x * 40}px, ${-y * 40}px)`;
            if(c3) c3.style.transform = `translate(${x * 50}px, ${-y * 50}px)`;
        });
    </script>
</body>
</html>
