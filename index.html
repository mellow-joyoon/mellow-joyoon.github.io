<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mellow Joyoon | 배우 조윤 팬페이지</title>
    <style>
        /* 팬페이지 디자인 설정 */
        body {
            background-color: #fdf2f4; /* 부드러운 분홍색 배경 */
            color: #333;
            font-family: 'Apple SD Gothic Neo', 'Nanum Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            /* 📱 배경에 은은한 그라데이션 추가 */
            background: linear-gradient(135deg, #fdf2f4 0%, #fae1e6 100%);
        }

        /* 📱 부드럽게 나타나는 애니메이션 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .main-content {
            animation: fadeIn 1s ease-out;
        }

        h1 {
            font-size: clamp(2rem, 10vw, 3rem); /* 📱 글씨 크기 최적화 */
            color: #d63384; 
            margin-bottom: 10px;
            word-break: keep-all;
            letter-spacing: -1px;
        }

        p {
            font-size: clamp(1rem, 4.5vw, 1.25rem);
            color: #555;
            word-break: keep-all;
            line-height: 1.6;
            margin-top: 0;
        }

        .profile-box {
            width: 70vw;
            height: 70vw;
            max-width: 280px;
            max-height: 280px;
            background-color: #fff;
            border-radius: 50%;
            margin: 30px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px rgba(214, 51, 132, 0.15); /* 📱 핑크빛 그림자 */
            overflow: hidden;
            border: 6px solid #fff;
            background: #fff;
        }

        .profile-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* 게시판 이동 버튼 스타일 */
        .btn-board {
            margin-top: 10px;
            display: inline-block;
            padding: 15px 45px;
            background-color: #d63384;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: clamp(1rem, 4vw, 1.15rem);
            box-shadow: 0 8px 20px rgba(214, 51, 132, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* 📱 모바일 터치 시 효과 */
        .btn-board:active {
            transform: scale(0.95);
            box-shadow: 0 4px 10px rgba(214, 51, 132, 0.4);
        }

        @media (min-width: 768px) {
            .btn-board:hover {
                background-color: #b0266a;
                transform: translateY(-5px);
                box-shadow: 0 12px 25px rgba(214, 51, 132, 0.4);
            }
        }

        .footer-text {
            font-size: 0.85rem;
            color: #d63384;
            margin-top: 40px;
            font-weight: 500;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="main-content">
        <h1>Mellow Joyoon</h1>
        <p>배우 조윤님의 모든 순간을<br>기록하는 공간입니다.</p>

        <div class="profile-box">
            <p style="font-size: 0.9rem; color: #bbb; padding: 20px;">
                여기에 조윤 배우님<br>사진이 들어갈 자리 ✨
            </p>
        </div>

        <a href="board.html" class="btn-board">게시판 입장하기 ✨</a>

        <p class="footer-text">Copyright © Mellow Joyoon. All rights reserved.</p>
    </div>

</body>
</html>
