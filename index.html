<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mellow Joyoon | 배우 조윤 팬페이지</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@1,900&family=Montserrat:wght@900&family=Noto+Sans+KR:wght@100;300;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --main-pink: #ff2d55;
            --bg-white: #ffffff;
            --text-black: #111;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--bg-white);
            font-family: 'Noto Sans KR', sans-serif;
        }

        /* 📱 PC 양옆 휑함을 채우는 수직 텍스트 스트립 */
        .side-strip {
            position: absolute;
            top: 0;
            width: 40px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }
        .left-strip { left: 2%; border-right: 1px solid rgba(0,0,0,0.05); }
        .right-strip { right: 2%; border-left: 1px solid rgba(0,0,0,0.05); }

        .vertical-text {
            transform: rotate(-90deg);
            white-space: nowrap;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 5px;
            color: #ccc;
            text-transform: uppercase;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 10%;
        }

        /* 📱 상단: 브랜드 네임 (아주 작고 세련되게) */
        .brand-label {
            font-family: 'Bodoni Moda', serif;
            font-style: italic;
            font-size: 1rem;
            color: var(--main-pink);
            letter-spacing: 2px;
            margin-bottom: -10px; /* 메인 이름과 밀착 */
            opacity: 0.8;
            animation: fadeInDown 1s ease both;
        }

        /* 📱 중앙: 배우 이름 (압도적 크기) */
        .actor-name {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(5rem, 15vw, 10rem);
            font-weight: 900;
            color: var(--text-black);
            line-height: 0.8;
            letter-spacing: -5px;
            margin-bottom: 40px;
            animation: fadeInLeft 1.2s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        .actor-name span {
            display: block;
            -webkit-text-stroke: 1.5px var(--text-black);
            color: transparent;
        }

        /* 📱 메인 비주얼 영역 (비대칭 와이드) */
        .visual-box {
            position: absolute;
            right: 10%;
            top: 50%;
            transform: translateY(-50%);
            width: 35vw;
            height: 50vh;
            z-index: -1; /* 이름 뒤로 깔리게 */
        }

        .main-image {
            width: 100%;
            height: 100%;
            background: #f7f7f7;
            overflow: hidden;
            box-shadow: 60px 60px 0px var(--bg-white), 61px 61px 0px rgba(0,0,0,0.05);
            transition: 0.5s;
        }

        .main-image img { width: 100%; height: 100%; object-fit: cover; }

        .visual-box::after {
            content: 'ACTRESS JO YOON';
            position: absolute;
            bottom: -30px; left: 0;
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 3rem;
            color: rgba(255, 45, 85, 0.1);
        }

        /* 📱 입장 버튼: 하단이 아닌 흐름 중간에 배치 */
        .entry-wrap {
            margin-top: 20px;
            animation: fadeInUp 1s ease 0.5s both;
        }

        .btn-enter {
            display: inline-block;
            padding: 20px 60px;
            background: var(--text-black);
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            letter-spacing: 3px;
            font-size: 0.9rem;
            transition: 0.3s;
            position: relative;
        }

        .btn-enter:hover {
            background: var(--main-pink);
            transform: translateX(10px);
        }

        /* 저작권 문구 유지 */
        .copyright {
            position: absolute;
            bottom: 40px;
            left: 10%;
            font-size: 0.75rem;
            color: #aaa;
            letter-spacing: 1px;
        }

        /* 애니메이션 설정 */
        @keyframes fadeInLeft { from { opacity: 0; transform: translateX(-100px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* 📱 모바일/태블릿 반응형 */
        @media (max-width: 1024px) {
            .side-strip { display: none; }
            .container { padding: 0 30px; }
            .actor-name { font-size: 6rem; letter-spacing: -2px; }
            .visual-box {
                position: relative; right: auto; top: auto; transform: none;
                width: 100%; height: 40vh; margin-bottom: 40px;
            }
            .visual-box::after { font-size: 1.5rem; bottom: -20px; }
        }

        @media (max-width: 480px) {
            .actor-name { font-size: 4.5rem; }
        }
    </style>
</head>
<body>

    <div class="side-strip left-strip">
        <div class="vertical-text">SCROLL TO DISCOVER — JO YOON</div>
    </div>
    <div class="side-strip right-strip">
        <div class="vertical-text">EST 2024 — MELLOW JOY OON</div>
    </div>

    <div class="container">
        <p class="brand-label">Mellow</p>
        
        <h1 class="actor-name">
            JO<br><span>YOON</span>
        </h1>

        <div class="visual-box">
            <div class="main-image">
                <div style="height:100%; display:flex; align-items:center; justify-content:center; color:#eee; font-weight:900; font-size:2rem;">IMAGE</div>
            </div>
        </div>

        <div class="entry-wrap">
            <a href="board.html" class="btn-enter">ENTER GALLERY</a>
        </div>
    </div>

    <p class="copyright">Copyright © Mellow Joyoon. All rights reserved.</p>

    <script>
        // PC 화면에서 마우스 위치에 따라 이름이 미세하게 반대로 움직이는 패럴랙스 효과
        document.addEventListener('mousemove', (e) => {
            const name = document.querySelector('.actor-name');
            const visual = document.querySelector('.visual-box');
            const x = (window.innerWidth / 2 - e.clientX) / 70;
            const y = (window.innerHeight / 2 - e.clientY) / 70;
            
            name.style.transform = `translate(${x}px, ${y}px)`;
            visual.style.transform = `translate(${-x}px, ${-y}px) translateY(-50%)`;
        });
    </script>
</body>
</html>
