        .title-column { text-align: left; padding-left: 20px; width: 50%; }
        .title-column a { text-decoration: none; color: #333; cursor: pointer; }
        .title-column a:hover { text-decoration: underline; }
        
        .btn-write { background: #fff; border: 1px solid #ccc; color: #333; padding: 5px 15px; text-decoration: none; font-size: 12px; border-radius: 2px; }
        .btn-write:hover { background: #f2f2f2; }
        
        tr:hover { background-color: #fdfdfd; }
