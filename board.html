<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mellow Joyoon | 자유게시판</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root {
            --primary: #d63384;
            --bg: #0b0b0b; /* 필모그래피 배경색 */
            --card-bg: rgba(255, 255, 255, 0.05); /* 필모그래피 카드 스타일 */
            --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            background-color: var(--bg); 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; 
            padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom);
            color: #eee; margin: 0; display: flex; flex-direction: column; align-items: center;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            width: 100%;
        }

        /* 상단 바 디자인 변경 */
        .top-bar {
            width: 100%; max-width: 1000px; margin: 15px 0;
            display: flex; justify-content: space-between; align-items: center;
            background: var(--card-bg); padding: 12px 15px; border: 1px solid var(--border);
            box-sizing: border-box; border-radius: 12px; backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .nav-links { display: flex; gap: 15px; align-items: center; }
        .home-link, .film-link {
            text-decoration: none; color: var(--primary); font-weight: bold; font-size: 13px;
            display: flex; align-items: center; gap: 5px; transition: opacity 0.2s;
        }
        .home-link:hover, .film-link:hover { opacity: 0.7; }

        .user-info { font-size: 12px; display: flex; align-items: center; gap: 8px; }
        .user-name { 
            font-weight: bold; color: #fff; cursor: pointer; 
            padding: 4px 10px; background: rgba(214, 51, 132, 0.15); border-radius: 6px; 
            transition: all 0.2s; border: 1px solid var(--primary);
        }
        .user-name:hover { background: var(--primary); color: white; }

        .btn-sub {
            text-decoration: none; color: #ccc; font-size: 11px; padding: 5px 10px;
            border: 1px solid var(--border); background: transparent; cursor: pointer; border-radius: 6px;
        }

        /* 게시판 컨테이너 다크화 */
        .board-container { 
            width: 100%; max-width: 1000px; background: var(--card-bg); padding: 15px; 
            border: 1px solid var(--border); border-radius: 12px; box-sizing: border-box;
            margin-bottom: 20px; backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .board-header { border-bottom: 1px solid var(--primary); padding-bottom: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .board-header h2 { margin: 0; font-size: 1.2rem; color: var(--primary); letter-spacing: -0.5px; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
        th { background: rgba(255, 255, 255, 0.03); padding: 12px 5px; color: #aaa; font-weight: normal; border-bottom: 1px solid var(--border); text-align: center; }
        td { border-bottom: 1px solid var(--border); padding: 14px 5px; text-align: center; color: #ddd; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .title-column { text-align: left; padding-left: 20px; color: #fff; cursor: pointer; font-weight: 500; }
        .title-column:hover { text-decoration: underline; color: var(--primary); }

        .btn-write { background: var(--primary); border: none; color: white; padding: 8px 16px; font-size: 12px; font-weight: bold; border-radius: 6px; text-decoration: none; transition: 0.3s; }
        .btn-write:hover { box-shadow: 0 0 15px rgba(214, 51, 132, 0.4); transform: translateY(-2px); }

        /* 페이지네이션 색상 변경 */
        .pagination {
            display: flex; justify-content: center; align-items: center;
            gap: 5px; margin: 25px 0 15px; flex-wrap: wrap;
        }
        .pg-btn {
            width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
            border-radius: 4px; font-size: 13px; color: #888; cursor: pointer; transition: 0.2s;
            border: 1px solid transparent;
        }
        .pg-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .pg-btn.active { 
            background: rgba(214, 51, 132, 0.1); color: var(--primary); font-weight: bold; border: 1px solid var(--primary);
        }

        /* 검색 영역 디자인 변경 */
        .search-container {
            display: flex; justify-content: center; gap: 5px; margin-bottom: 10px; padding: 0 5px;
            width: 100%; box-sizing: border-box;
        }
        .search-select {
            padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px;
            font-size: 13px; color: #fff; background: #222; outline: none; flex-shrink: 0;
        }
        .search-input-wrapper {
            display: flex; flex: 1; max-width: 350px; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; background: #222;
        }
        .search-input {
            flex: 1; border: none; padding: 8px 12px; font-size: 13px; outline: none; width: 100%; background: transparent; color: #fff;
        }
        .search-btn {
            background: #333; color: white; border: none; padding: 0 15px;
            display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: 0.2s;
        }
        .search-btn:hover { background: var(--primary); }
        .search-btn svg { width: 16px; height: 16px; fill: white; }

        @media (max-width: 600px) {
            body { padding: env(safe-area-inset-top) 5px env(safe-area-inset-bottom); }
            .top-bar { padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 11px; }
            .board-container { padding: 10px; border-radius: 8px; }
            table { font-size: 11px; } 
            td { padding: 12px 3px; }
            .title-column { padding-left: 10px; }
            .col-author { width: 70px !important; }
            .col-date { width: 50px !important; }
            .col-views { width: 40px !important; }
            .search-select { padding: 8px 5px; font-size: 12px; }
            .search-input { padding: 8px 8px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="nav-links">
            <a href="index.html" class="home-link">홈</a>
            <a href="joyoon-list.html" class="film-link">필모그래피</a>
        </div>
        <div id="authStatus"><span style="font-size: 11px; color: #666;">확인 중...</span></div>
    </div>

    <div class="board-container">
        <div class="board-header">
            <h2>자유게시판</h2>
            <a href="write.html" class="btn-write">글쓰기</a>
        </div>
        <table>
            <thead>
                <tr>
                    <th style="width: auto;">제목</th>
                    <th class="col-author" style="width: 100px;">작성자</th>
                    <th class="col-date" style="width: 70px;">날짜</th>
                    <th class="col-views" style="width: 60px;">조회</th>
                </tr>
            </thead>
            <tbody id="post-list">
                <tr><td colspan="4" style="color:#666;">데이터를 불러오는 중...</td></tr>
            </tbody>
        </table>

        <div class="pagination" id="pagination-container"></div>

        <div class="search-container">
            <select class="search-select" id="searchType">
                <option value="title">제목만</option>
                <option value="author">글작성자</option>
                <option value="content">글내용</option>
            </select>
            <div class="search-input-wrapper">
                <input type="text" class="search-input" placeholder="검색어를 입력해주세요" id="searchInput">
                <button class="search-btn" id="searchBtn">
                    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 10 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, getDocs, where, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCP4Ur--4UGGpNSK_P7qRvnVFDZbqn436A",
            authDomain: "mellow-joyoon.firebaseapp.com",
            projectId: "mellow-joyoon",
            storageBucket: "mellow-joyoon.firebasestorage.app",
            messagingSenderId: "556097417487",
            appId: "1:556097417487:web:0dca0eb26ba28d893c4e7a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentPage = 1;
        const postsPerPage = 10;

        onAuthStateChanged(auth, (user) => {
            const authStatusDiv = document.getElementById("authStatus");
            if (user) {
                authStatusDiv.innerHTML = `
                    <div class="user-info">
                        <span class="user-name" onclick="location.href='login.html?mode=profile'">${user.displayName || '팬'}님</span>
                        <button class="btn-sub" id="logoutBtn">로그아웃</button>
                    </div>`;
                document.getElementById("logoutBtn").onclick = async () => {
                    if (confirm("로그아웃 하시겠습니까?")) { await signOut(auth); location.reload(); }
                };
            } else {
                authStatusDiv.innerHTML = `<a href="login.html" class="btn-sub" style="text-decoration:none">로그인</a>`;
            }
        });

        async function loadPosts(pageNum = 1, searchKeyword = "", searchType = "title") {
            try {
                currentPage = pageNum;
                const postList = document.getElementById("post-list");
                postList.innerHTML = '<tr><td colspan="4">데이터를 불러오는 중...</td></tr>';

                const postsCol = collection(db, "posts");
                let q;

                if (searchKeyword) {
                    q = query(postsCol, where(searchType, ">=", searchKeyword), where(searchType, "<=", searchKeyword + "\uf8ff"), limit(100));
                } else {
                    q = query(postsCol, orderBy("createdAt", "desc"));
                }

                const snapshot = await getDocs(q);
                const allDocs = snapshot.docs;
                
                const totalPosts = allDocs.length;
                const totalPages = Math.ceil(totalPosts / postsPerPage);
                renderPagination(totalPages, pageNum);

                const startIndex = (pageNum - 1) * postsPerPage;
                const pageDocs = allDocs.slice(startIndex, startIndex + postsPerPage);

                postList.innerHTML = "";
                if(pageDocs.length === 0) {
                    postList.innerHTML = '<tr><td colspan="4">게시글이 없습니다.</td></tr>';
                    return;
                }

                pageDocs.forEach((doc) => {
                    const data = doc.data();
                    let dateStr = "-";
                    if (data.createdAt) {
                        const dateObj = new Date(data.createdAt.seconds * 1000);
                        dateStr = `${dateObj.getMonth() + 1}. ${dateObj.getDate()}`;
                    }

                    postList.innerHTML += `
                        <tr>
                            <td class="title-column" onclick="location.href='view.html?id=${doc.id}'">${data.title}</td>
                            <td class="col-author">${data.author}</td>
                            <td class="col-date">${dateStr}</td>
                            <td class="col-views">${data.views || 0}</td>
                        </tr>`;
                });
            } catch (e) {
                console.error(e);
                document.getElementById("post-list").innerHTML = '<tr><td colspan="4">오류가 발생했습니다.</td></tr>';
            }
        }

        function renderPagination(totalPages, activePage) {
            const container = document.getElementById("pagination-container");
            container.innerHTML = "";
            if (totalPages <= 1) return;
            
            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement("div");
                btn.className = `pg-btn ${i === activePage ? 'active' : ''}`;
                btn.innerText = i;
                btn.onclick = () => {
                    loadPosts(i, document.getElementById("searchInput").value, document.getElementById("searchType").value);
                    window.scrollTo(0, 0);
                };
                container.appendChild(btn);
            }
        }

        document.getElementById("searchBtn").onclick = () => {
            const keyword = document.getElementById("searchInput").value.trim();
            const type = document.getElementById("searchType").value;
            loadPosts(1, keyword, type);
        };

        document.getElementById("searchInput").onkeyup = (e) => {
            if (e.key === 'Enter') document.getElementById("searchBtn").click();
        };

        loadPosts(1);
    </script>
</body>
</html>
