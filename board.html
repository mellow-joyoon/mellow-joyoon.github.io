<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Mellow Joyoon | 자유게시판</title>
    <style>
        /* 화면 중앙 정렬을 위한 설정 */
        body { 
            background-color: #f6f6f6; 
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; 
            padding: 50px 20px; 
            color: #333; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 홈 버튼 스타일 */
        .home-nav {
            width: 1000px;
            margin-bottom: 15px;
            display: flex;
            justify-content: flex-start;
        }
        .home-link {
            text-decoration: none;
            color: #d63384;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            border-radius: 5px;
            transition: background 0.2s;
        }
        .home-link:hover {
            background-color: #fdf2f4;
        }

        .board-container { 
            width: 1000px; 
            background: white; 
            padding: 25px; 
            border: 1px solid #ddd; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .board-header { 
            border-bottom: 2px solid #333; 
            padding-bottom: 15px; 
            margin-bottom: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .board-header h2 { margin: 0; font-size: 1.5rem; color: #d63384; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { border-top: 1px solid #eee; border-bottom: 1px solid #eee; background: #f9f9f9; padding: 12px; color: #666; font-weight: normal; }
        td { border-bottom: 1px solid #eee; padding: 15px 10px; text-align: center; color: #333; }
        
        .title-column { text-align: left; padding-left: 20px; width: 50%; }
        .title-column span { cursor: pointer; font-weight: 500; }
        .title-column span:hover { text-decoration: underline; color: #d63384; }
        
        .btn-write { background: #d63384; border: none; color: white; padding: 8px 18px; text-decoration: none; font-size: 13px; font-weight: bold; cursor: pointer; }
        .btn-write:hover { background: #c12a74; }
        
        tr:hover { background-color: #fdfdfd; }

        /* 페이징 버튼 디자인 */
        .pagination {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .btn-page {
            background: white;
            border: 1px solid #ddd;
            padding: 7px 15px;
            font-size: 12px;
            cursor: pointer;
            color: #666;
            transition: all 0.2s;
        }
        .btn-page:hover:not(:disabled) {
            background: #fdf2f4;
            color: #d63384;
            border-color: #d63384;
        }
        .btn-page:disabled {
            color: #ccc;
            cursor: not-allowed;
            background: #fafafa;
        }
    </style>
</head>
<body>

    <nav class="home-nav">
        <a href="index.html" class="home-link">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            메인 홈으로
        </a>
    </nav>

    <div class="board-container">
        <div class="board-header">
            <h2>자유게시판</h2>
            <a href="write.html" class="btn-write">글쓰기</a>
        </div>
        <table>
            <thead>
                <tr>
                    <th style="width: 8%;">번호</th>
                    <th>제목</th>
                    <th style="width: 15%;">작성자</th>
                    <th style="width: 15%;">날짜</th>
                    <th style="width: 8%;">조회</th>
                </tr>
            </thead>
            <tbody id="post-list">
                <tr><td colspan="5">데이터를 불러오는 중입니다...</td></tr>
            </tbody>
        </table>

        <div class="pagination">
            <button class="btn-page" id="prevBtn" disabled>이전</button>
            <button class="btn-page" id="nextBtn" disabled>다음</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, limit, getDocs, startAfter, endBefore, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCP4Ur--4UGGpNSK_P7qRvnVFDZbqn436A",
          authDomain: "mellow-joyoon.firebaseapp.com",
          projectId: "mellow-joyoon",
          storageBucket: "mellow-joyoon.firebasestorage.app",
          messagingSenderId: "556097417487",
          appId: "1:556097417487:web:0dca0eb26ba28d893c4e7a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 페이징 관련 변수
        const pageSize = 10; // 한 페이지에 10개씩
        let firstVisible = null;
        let lastVisible = null;

        // 목록 그리기 함수
        function renderList(snapshot) {
            const postList = document.getElementById("post-list");
            postList.innerHTML = "";
            
            if (snapshot.empty) {
                postList.innerHTML = '<tr><td colspan="5">등록된 게시글이 없습니다.</td></tr>';
                return;
            }

            // 현재 페이지의 첫 번째와 마지막 문서 기억
            firstVisible = snapshot.docs[0];
            lastVisible = snapshot.docs[snapshot.docs.length - 1];

            // 번호 계산 (임시로 10개 단위 계산)
            let index = snapshot.size;

            snapshot.forEach((doc) => {
                const data = doc.data();
                const date = data.createdAt ? new Date(data.createdAt.seconds * 1000).toLocaleDateString() : "-";
                
                const row = `
                    <tr>
                        <td>-</td>
                        <td class="title-column">
                            <span onclick="goToView('${doc.id}')">${data.title}</span>
                        </td>
                        <td>${data.author}</td>
                        <td>${date}</td>
                        <td>${data.views || 0}</td>
                    </tr>
                `;
                postList.innerHTML += row;
            });

            // 버튼 상태 업데이트 (간단 구현)
            document.getElementById("prevBtn").disabled = !firstVisible; 
            document.getElementById("nextBtn").disabled = snapshot.size < pageSize;
        }

        // 초기 페이지 로드
        async function loadFirstPage() {
            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(pageSize));
            const snapshot = await getDocs(q);
            renderList(snapshot);
        }

        // 다음 페이지 버튼 클릭
        document.getElementById("nextBtn").onclick = async () => {
            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"), startAfter(lastVisible), limit(pageSize));
            const snapshot = await getDocs(q);
            if (!snapshot.empty) renderList(snapshot);
        };

        // 이전 페이지 버튼 클릭
        document.getElementById("prevBtn").onclick = async () => {
            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"), endBefore(firstVisible), limitToLast(pageSize));
            const snapshot = await getDocs(q);
            if (!snapshot.empty) renderList(snapshot);
        };

        window.goToView = (id) => {
            location.href = `view.html?id=${id}`;
        };

        // 시작!
        loadFirstPage();
    </script>
</body>
</html>
