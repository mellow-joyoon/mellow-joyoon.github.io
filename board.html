<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mellow Joyoon | 자유게시판</title>
    <style>
        body { 
            background-color: #f6f6f6; 
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; 
            padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom);
            color: #333; 
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .top-bar {
            width: 100%;
            max-width: 1000px;
            margin: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            padding: 12px 15px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }

        .nav-links { display: flex; gap: 15px; align-items: center; }
        .home-link, .film-link {
            text-decoration: none; color: #d63384; font-weight: bold; font-size: 13px;
            display: flex; align-items: center; gap: 5px;
        }

        .user-info { font-size: 12px; display: flex; align-items: center; gap: 8px; }
        
        /* 닉네임 클릭 스타일 추가 */
        .user-name { 
            font-weight: bold; color: #333; cursor: pointer; 
            padding: 4px 8px; background: #fdf2f4; border-radius: 6px; transition: 0.2s;
        }
        .user-name:hover { background: #d63384; color: white; }

        .btn-sub {
            text-decoration: none; color: #666; font-size: 11px; padding: 4px 8px;
            border: 1px solid #ccc; background: white; cursor: pointer; border-radius: 4px;
        }

        .board-container { 
            width: 100%; max-width: 1000px; background: white; padding: 15px; 
            border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box;
        }

        .board-header { border-bottom: 2px solid #333; padding-bottom: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .board-header h2 { margin: 0; font-size: 1.2rem; color: #d63384; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
        th { background: #f9f9f9; padding: 12px 5px; color: #666; font-weight: normal; border-bottom: 1px solid #eee; }
        td { border-bottom: 1px solid #eee; padding: 14px 5px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .title-column { text-align: left; padding-left: 10px; color: #333; cursor: pointer; }
        .btn-write { background: #d63384; border: none; color: white; padding: 8px 16px; font-size: 12px; font-weight: bold; border-radius: 6px; text-decoration: none; }

        @media (max-width: 600px) {
            .col-no, .col-views { display: none; }
            .top-bar { padding: 10px; border-radius: 0; margin-top: 0; border-left: none; border-right: none; }
            .user-name { font-size: 11px; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="nav-links">
            <a href="index.html" class="home-link">홈</a>
            <a href="joyoon-list.html" class="film-link">필모그래피</a>
        </div>
        <div id="authStatus"><span style="font-size: 11px; color: #999;">확인 중...</span></div>
    </div>

    <div class="board-container">
        <div class="board-header">
            <h2>자유게시판</h2>
            <a href="write.html" class="btn-write">글쓰기</a>
        </div>
        <table>
            <thead>
                <tr>
                    <th class="col-no">번호</th>
                    <th>제목</th>
                    <th class="col-author">작성자</th>
                    <th class="col-date">날짜</th>
                    <th class="col-views">조회</th>
                </tr>
            </thead>
            <tbody id="post-list">
                <tr><td colspan="5">로딩 중...</td></tr>
            </tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCP4Ur--4UGGpNSK_P7qRvnVFDZbqn436A",
            authDomain: "mellow-joyoon.firebaseapp.com",
            projectId: "mellow-joyoon",
            storageBucket: "mellow-joyoon.firebasestorage.app",
            messagingSenderId: "556097417487",
            appId: "1:556097417487:web:0dca0eb26ba28d893c4e7a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // 상단 인증 상태 및 닉네임 클릭 이벤트
        onAuthStateChanged(auth, (user) => {
            const authStatusDiv = document.getElementById("authStatus");
            if (user) {
                authStatusDiv.innerHTML = `
                    <div class="user-info">
                        <span class="user-name" onclick="location.href='login.html?mode=profile'">${user.displayName || '팬'}님</span>
                        <button class="btn-sub" id="logoutBtn">로그아웃</button>
                    </div>
                `;
                document.getElementById("logoutBtn").onclick = async () => {
                    if (confirm("로그아웃 하시겠습니까?")) { await signOut(auth); location.reload(); }
                };
            } else {
                authStatusDiv.innerHTML = `<a href="login.html" class="btn-sub" style="text-decoration:none">로그인</a>`;
            }
        });

        // 게시글 로드 로직 (기존 유지)
        async function loadPosts() {
            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(15));
            const snapshot = await getDocs(q);
            const postList = document.getElementById("post-list");
            postList.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const date = data.createdAt ? new Date(data.createdAt.seconds * 1000).toLocaleDateString('ko-KR', {month:'2-digit', day:'2-digit'}) : "-";
                postList.innerHTML += `
                    <tr>
                        <td class="col-no">-</td>
                        <td class="title-column" onclick="location.href='view.html?id=${doc.id}'">${data.title}</td>
                        <td class="col-author">${data.author}</td>
                        <td class="col-date">${date}</td>
                        <td class="col-views">${data.views || 0}</td>
                    </tr>`;
            });
        }
        loadPosts();
    </script>
</body>
</html>
