<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Mellow Joyoon | 자유게시판</title>
    <style>
        body { background-color: #fdf2f4; font-family: sans-serif; padding: 20px; }
        .board-container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; }
        h2 { color: #d63384; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border-bottom: 1px solid #eee; padding: 15px; text-align: center; }
        th { background-color: #fff0f3; color: #d63384; }
        .btn-write { background: #d63384; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; float: right; margin-bottom: 15px; }
        tr:hover { background-color: #f9f9f9; cursor: pointer; }
    </style>
</head>
<body>
    <div class="board-container">
        <h2>조윤 배우님 자유게시판</h2>
        <a href="write.html" class="btn-write">글쓰기</a>
        <table>
            <thead>
                <tr>
                    <th>번호</th>
                    <th>제목</th>
                    <th>작성자</th>
                    <th>날짜</th>
                </tr>
            </thead>
            <tbody id="post-list">
                </tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCP4Ur--4UGGpNSK_P7qRvnVFDZbqn436A",
          authDomain: "mellow-joyoon.firebaseapp.com",
          projectId: "mellow-joyoon",
          storageBucket: "mellow-joyoon.firebasestorage.app",
          messagingSenderId: "556097417487",
          appId: "1:556097417487:web:0dca0eb26ba28d893c4e7a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 장부에서 글 목록 실시간으로 가져오기
        const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
        
        onSnapshot(q, (snapshot) => {
            const postList = document.getElementById("post-list");
            postList.innerHTML = ""; 
            
            let number = snapshot.size;
            snapshot.forEach((doc) => {
                const data = doc.data();
                const date = data.createdAt ? new Date(data.createdAt.seconds * 1000).toLocaleDateString() : "-";
                
                // [수정된 부분] tr 태그에 클릭 시 해당 글의 ID를 가지고 view.html로 이동하는 기능을 넣었습니다.
                const row = `
                    <tr onclick="location.href='view.html?id=${doc.id}'">
                        <td>${number--}</td>
                        <td style="text-align:left;">${data.title}</td>
                        <td>${data.author}</td>
                        <td>${date}</td>
                    </tr>
                `;
                postList.innerHTML += row;
            });
        });
    </script>
</body>
</html>
