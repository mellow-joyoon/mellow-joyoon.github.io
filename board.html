<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mellow Joyoon | 자유게시판</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@700&family=Montserrat:wght@500;900&family=Noto+Sans+KR:wght@100;400;900&display=swap" rel="stylesheet">
    <link href="https://webfontworld.github.io/gmarket/GmarketSans.css" rel="stylesheet">

    <style>
        :root {
            --happy-pink: #ff85a1;
            --sunny-yellow: #ffde59;
            --sky-blue: #87ceeb;
            --text-main: #444;
            --bg-cream: #fffcf2;
            --card-white: rgba(255, 255, 255, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background-color: var(--bg-cream); 
            font-family: 'Noto Sans KR', sans-serif; 
            padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom);
            color: var(--text-main); 
            display: flex; flex-direction: column; align-items: center;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            width: 100%;
            min-height: 100vh;
        }

        /* ✨ 배경 구슬 효과 (원본 유지) */
        .deco-circle {
            position: fixed; border-radius: 50%; z-index: -1; filter: blur(40px); opacity: 0.4;
            animation: pulse 6s infinite alternate;
        }
        .circle-1 { width: 350px; height: 350px; background: var(--happy-pink); top: -100px; left: -100px; }
        .circle-2 { width: 300px; height: 300px; background: var(--sunny-yellow); bottom: -50px; right: -50px; animation-delay: 1s; }
        .circle-3 { width: 200px; height: 200px; background: var(--sky-blue); top: 20%; right: 5%; animation-delay: 2s; }

        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.15); } }

        /* 상단 바 디자인 (원본 유지) */
        .top-bar {
            width: 100%; max-width: 1000px; margin: 15px 0;
            display: flex; justify-content: space-between; align-items: center;
            background: var(--card-white); padding: 12px 20px; 
            border: 2px solid #fff; border-radius: 50px; 
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .nav-links { display: flex; gap: 15px; align-items: center; }
        .home-link, .film-link {
            text-decoration: none; color: var(--happy-pink); 
            font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 14px;
            transition: 0.2s;
        }

        /* 게시판 컨테이너 (원본 유지) */
        .board-container { 
            width: 100%; max-width: 1000px; background: var(--card-white); padding: 25px; 
            border: 2px solid #fff; border-radius: 30px; box-sizing: border-box;
            margin-bottom: 40px; backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .board-header { border-bottom: 2px solid #f0f0f0; padding-bottom: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        /* ✅ 수정 포인트: 자유게시판 글자 크기(1.5rem)와 굵기(500) 최적화 */
        .board-header h2 { 
            margin: 0; 
            font-size: 1.5rem; 
            color: var(--text-main); 
            font-family: 'Montserrat', 'GmarketSans', sans-serif; 
            font-weight: 500; 
            letter-spacing: -0.5px; 
        }
        .board-header h2 span { color: var(--happy-pink); font-weight: 700; }

        table { width: 100%; border-collapse: collapse; font-size: 14px; table-layout: fixed; }
        th { 
            padding: 15px 5px; color: #999; font-weight: bold; 
            border-bottom: 2px solid #f9f9f9; text-align: center; 
            font-family: 'Gaegu', cursive; font-size: 1.1rem;
        }
        td { border-bottom: 1px solid #f9f9f9; padding: 16px 5px; text-align: center; color: #666; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .title-column { text-align: left; padding-left: 20px; color: var(--text-main); cursor: pointer; font-weight: 500; }
        .title-column:hover { color: var(--happy-pink); font-weight: bold; }

        .btn-write { 
            background: var(--happy-pink); color: white; padding: 10px 25px; 
            font-size: 14px; font-weight: 900; border-radius: 50px; 
            text-decoration: none; transition: 0.2s;
            box-shadow: 0 4px 0px #e05e7a;
            font-family: 'Gaegu', cursive; font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div class="deco-circle circle-1"></div>
    <div class="deco-circle circle-2"></div>
    <div class="deco-circle circle-3"></div>

    <div class="top-bar">
        <div class="nav-links">
            <a href="index.html" class="home-link">HOME</a>

        </div>
        <div id="authStatus"><span style="font-size: 11px; color: #ccc;">Checking...</span></div>

    <div class="board-container">
        <div class="board-header">
            <h2>자유<span>게시판</span></h2>
            <a href="write.html" class="btn-write">글쓰기 ♪</a>

        <table>

            </thead>
            <tbody id="post-list">

            </tbody>
        </table>

</body>
</html>
