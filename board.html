<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Mellow Joyoon | 자유게시판</title>
    <style>
        /* 네이버 카페 느낌의 깔끔한 배경과 폰트 */
        body { background-color: #f6f6f6; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; padding: 20px; color: #333; }
        .board-container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border: 1px solid #ddd; border-radius: 0; }
        
        /* 게시판 제목과 상단 바 */
        .board-header { border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .board-header h2 { margin: 0; font-size: 1.5rem; color: #d63384; }
        
        /* 네이버 카페 스타일 표 */
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { border-top: 1px solid #eee; border-bottom: 1px solid #eee; background: #f9f9f9; padding: 10px; color: #666; font-weight: normal; }
        td { border-bottom: 1px solid #eee; padding: 12px 10px; text-align: center; color: #333; }
        
        .title-column { text-align: left; padding-left: 20px; width: 50%; }
        /* 제목 클릭 시 손가락 모양 커서와 밑줄 효과 */
        .title-column span { cursor: pointer; }
        .title-column span:hover { text-decoration: underline; color: #d63384; }
        
        .btn-write { background: #fff; border: 1px solid #ccc; color: #333; padding: 5px 15px; text-decoration: none; font-size: 12px; border-radius: 2px; }
        .btn-write:hover { background: #f2f2f2; }
        
        tr:hover { background-color: #fdfdfd; }
    </style>
</head>
<body>
    <div class="board-container">
        <div class="board-header">
            <h2>자유게시판</h2>
            <a href="write.html" class="btn-write">글쓰기</a>
        </div>
        <table>
            <thead>
                <tr>
                    <th style="width: 8%;">번호</th>
                    <th>제목</th>
                    <th style="width: 15%;">작성자</th>
                    <th style="width: 15%;">날짜</th>
                    <th style="width: 8%;">조회</th>
                </tr>
            </thead>
            <tbody id="post-list">
                </tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCP4Ur--4UGGpNSK_P7qRvnVFDZbqn436A",
          authDomain: "mellow-joyoon.firebaseapp.com",
          projectId: "mellow-joyoon",
          storageBucket: "mellow-joyoon.firebasestorage.app",
          messagingSenderId: "556097417487",
          appId: "1:556097417487:web:0dca0eb26ba28d893c4e7a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 글 목록 실시간으로 불러오기
        const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));

        onSnapshot(q, (snapshot) => {
            const postList = document.getElementById("post-list");
            postList.innerHTML = ""; // 기존 목록 비우기
            
            let index = snapshot.size; // 번호를 역순으로 매기기 위해 사용

            snapshot.forEach((doc) => {
                const data = doc.data();
                const date = data.createdAt ? new Date(data.createdAt.seconds * 1000).toLocaleDateString() : "-";
                
                const row = `
                    <tr>
                        <td>${index--}</td>
                        <td class="title-column">
                            <span onclick="goToView('${doc.id}')">${data.title}</span>
                        </td>
                        <td>${data.author}</td>
                        <td>${date}</td>
                        <td>${data.views || 0}</td>
                    </tr>
                `;
                postList.innerHTML += row;
            });
        });

        // 제목 클릭 시 상세페이지로 이동 (global function)
        window.goToView = (id) => {
            location.href = `view.html?id=${id}`;
        };
    </script>
</body>
</html>
