<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mellow Joyoon | Filmography</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@700&family=Noto+Sans+KR:wght@100;400;900&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root {
            --happy-pink: #ff85a1;
            --sunny-yellow: #ffde59;
            --sky-blue: #87ceeb;
            --text-main: #444;
            --bg-cream: #fffcf2;
            --card-white: rgba(255, 255, 255, 0.8);
            --safe-top: env(safe-area-inset-top);
        }

        body {
            margin: 0;
            background-color: var(--bg-cream);
            color: var(--text-main);
            font-family: 'Noto Sans KR', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            word-break: keep-all;
            /* 스크롤바 숨김 */
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        body::-webkit-scrollbar { display: none; }

        /* ✨ 대문 배경 구슬 효과 */
        .deco-circle {
            position: fixed;
            border-radius: 50%;
            z-index: -1;
            filter: blur(50px);
            opacity: 0.5;
            animation: float 8s infinite alternate;
        }
        .circle-1 { width: 400px; height: 400px; background: var(--happy-pink); top: -150px; right: -100px; }
        .circle-2 { width: 350px; height: 350px; background: var(--sunny-yellow); bottom: -100px; left: -100px; animation-delay: 2s; }
        
        @keyframes float { from { transform: scale(1) translate(0, 0); } to { transform: scale(1.1) translate(20px, 20px); } }

        /* 뒤로가기 버튼 */
        .back-to-board {
            position: fixed;
            top: calc(20px + var(--safe-top));
            left: 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--card-white);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid #fff;
            border-radius: 50px;
            color: var(--happy-pink);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 900;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .back-to-board:hover {
            transform: scale(1.05);
            background: var(--happy-pink);
            color: #fff;
        }

        /* 헤더 디자인 */
        header {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .header-title {
            font-family: 'Gaegu', cursive;
            font-size: clamp(4rem, 15vw, 8rem);
            line-height: 1;
            color: var(--happy-pink);
            margin: 0;
            text-shadow: 4px 4px 0px #fff;
        }

        .header-sub {
            font-size: clamp(1rem, 3vw, 1.2rem);
            margin-top: 10px;
            letter-spacing: 0.2rem;
            color: var(--text-main);
            font-weight: 400;
            opacity: 0.7;
        }

        /* 메인 컨텐츠 */
        .content-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 100px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
        }

        .section-header h2 {
            font-family: 'Gaegu', cursive;
            font-size: 2.5rem;
            color: var(--happy-pink);
            margin: 0;
        }

        .line {
            flex: 1;
            height: 3px;
            background: linear-gradient(to right, var(--sunny-yellow), transparent);
            border-radius: 50px;
        }

        /* 필모그래피 그리드 */
        .filmo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
        }

        .work-card {
            position: relative;
            background: var(--card-white);
            border-radius: 40px; /* 대문 구슬 느낌의 둥근 디자인 */
            overflow: hidden;
            border: 4px solid #fff;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .work-img-wrap {
            aspect-ratio: 3 / 4;
            overflow: hidden;
        }

        .work-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .work-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(255,255,255,0.95) 30%, transparent 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 30px;
            opacity: 0;
            transition: all 0.4s ease;
        }

        @media (hover: hover) {
            .work-card:hover {
                transform: translateY(-15px) rotate(2deg);
                box-shadow: 0 25px 50px rgba(255, 133, 161, 0.2);
            }
            .work-card:hover .work-img { transform: scale(1.1); }
            .work-card:hover .work-overlay { opacity: 1; }
        }

        .year { color: var(--happy-pink); font-size: 1rem; font-weight: 900; margin-bottom: 5px; }
        .title { 
            font-family: 'Gaegu', cursive;
            font-size: 1.8rem; 
            font-weight: bold; 
            margin: 0 0 5px 0; 
            color: var(--text-main);
        }
        .role { font-size: 0.95rem; color: #777; margin-bottom: 15px; }
        .tags { display: flex; gap: 8px; flex-wrap: wrap; }
        .tag { 
            background: #fff;
            color: var(--happy-pink);
            padding: 5px 12px; 
            border-radius: 50px; 
            font-size: 0.75rem; 
            font-weight: bold;
            border: 1px solid var(--happy-pink);
        }

        /* 커스텀 커서 (대문 스타일) */
        #cursor {
            width: 25px; height: 25px;
            background: var(--happy-pink);
            opacity: 0.3;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease-out;
            display: none;
        }

        @media (hover: hover) and (pointer: fine) { #cursor { display: block; } }

        /* 반응형 */
        @media (max-width: 1024px) {
            .filmo-grid { grid-template-columns: repeat(2, 1fr); }
            header { height: 50vh; }
        }

        @media (max-width: 767px) {
            .filmo-grid { grid-template-columns: repeat(1, 1fr); gap: 30px; }
            .work-overlay { 
                opacity: 1; 
                background: linear-gradient(to top, rgba(255,255,255,0.9) 0%, transparent 60%);
                padding: 20px;
            }
            .header-title { font-size: 5rem; }
            .work-card { border-radius: 30px; }
        }
    </style>
</head>
<body>
    <div id="cursor"></div>
    <div class="deco-circle circle-1"></div>
    <div class="deco-circle circle-2"></div>

    <a href="board.html" class="back-to-board">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Board
    </a>

    <header>
        <div class="header-title" data-aos="zoom-in" data-aos-duration="1200">Joy Oon</div>
        <div class="header-sub" data-aos="fade-up" data-aos-delay="400">나의 소중한 기록들</div>
    </header>

    <main class="content-wrapper">
        <section class="section-header" data-aos="fade-right">
            <h2>Works</h2>
            <div class="line"></div>
        </section>

        <div class="filmo-grid">
            <div class="work-card" data-aos="fade-up">
                <div class="work-img-wrap">
                    <img src="images/poster2025.jpg" alt="원수를 모시게 되었습니다" class="work-img">
                </div>
                <div class="work-overlay">
                    <div class="year">2025</div>
                    <h3 class="title">원수를 모시게 되었습니다</h3>
                    <div class="role">주연 | 이수지 역</div>
                    <div class="tags">
                        <span class="tag">#GL</span>
                        <span class="tag">#첫사랑</span>
                    </div>
                </div>
            </div>
            
            </div>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });

        const cursor = document.getElementById('cursor');
        if (window.matchMedia("(hover: hover)").matches) {
            document.addEventListener('mousemove', (e) => {
                cursor.style.transform = `translate(${e.clientX - 12}px, ${e.clientY - 12}px)`;
            });

            document.querySelectorAll('.work-card, .back-to-board').forEach(el => {
                el.addEventListener('mouseenter', () => {
                    cursor.style.transform += ' scale(3)';
                    cursor.style.opacity = '0.1';
                });
                el.addEventListener('mouseleave', () => {
                    cursor.style.transform = cursor.style.transform.replace(' scale(3)', '');
                    cursor.style.opacity = '0.3';
                });
            });
        }
    </script>
</body>
</html>
