<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mellow Joyoon | Filmography</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root {
            --primary: #d63384;
            --bg: #0b0b0b;
            --card-bg: rgba(255, 255, 255, 0.05);
            --safe-bottom: env(safe-area-inset-bottom);
            --safe-top: env(safe-area-inset-top);
        }

        /* 전체 페이지 스크롤바 숨기기 */
        body {
            margin: 0;
            background-color: var(--bg);
            color: #fff;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            word-break: keep-all;

            /* 스크롤바 숨김 (IE, Edge, Firefox) */
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 스크롤바 숨김 (Chrome, Safari, Opera, Samsung Internet) */
        body::-webkit-scrollbar {
            display: none;
        }

        /* 자유게시판 돌아가기 버튼 디자인 */
        .back-to-board {
            position: fixed;
            top: calc(20px + var(--safe-top));
            left: 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            color: #fff;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .back-to-board:hover {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(214, 51, 132, 0.4);
            transform: translateX(5px);
        }

        .back-to-board svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }

        /* 배경 조명 효과 */
        .glow-effect {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 20%, rgba(214, 51, 132, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(0, 199, 60, 0.05) 0%, transparent 40%);
            z-index: -1;
            pointer-events: none;
        }

        /* 헤더: 시네마틱 비주얼 */
        header {
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            padding: 0 20px;
        }

        .header-title {
            font-size: clamp(3.5rem, 12vw, 7rem);
            font-weight: 900;
            margin: 0;
            background: linear-gradient(135deg, #fff 30%, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -3px;
            text-transform: uppercase;
        }

        .header-sub {
            font-size: clamp(1rem, 3vw, 1.4rem);
            margin-top: 15px;
            letter-spacing: 0.3rem;
            opacity: 0.6;
            font-weight: 300;
        }

        /* 메인 컨테이너 */
        .content-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px 100px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        .section-header h2 {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            margin: 0;
        }

        .line {
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, var(--primary), transparent);
        }

        /* 반응형 그리드 시스템 */
        .filmo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px 30px;
        }

        .work-card {
            position: relative;
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            -webkit-tap-highlight-color: transparent;
        }

        .work-img-wrap {
            aspect-ratio: 3 / 4;
            overflow: hidden;
        }

        .work-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
        }

        .work-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 20%, transparent 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 30px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        @media (hover: hover) {
            .work-card:hover {
                transform: translateY(-20px);
                border-color: var(--primary);
                box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            }
            .work-card:hover .work-img { transform: scale(1.1); }
            .work-card:hover .work-overlay { opacity: 1; }
        }

        @media (max-width: 1024px) {
            .filmo-grid { grid-template-columns: repeat(2, 1fr); gap: 20px; }
            header { height: 50vh; }
        }

        @media (max-width: 767px) {
            .filmo-grid { grid-template-columns: repeat(1, 1fr); }
            .work-overlay { 
                opacity: 1; 
                background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 50%);
                padding: 20px;
            }
            .header-title { letter-spacing: -1px; }
            .content-wrapper { padding-bottom: calc(60px + var(--safe-bottom)); }
            .back-to-board { font-size: 0.8rem; padding: 8px 14px; }
        }

        .year { color: var(--primary); font-size: 0.9rem; font-weight: 700; margin-bottom: 8px; }
        .title { font-size: 1.6rem; font-weight: 800; margin: 0 0 10px 0; }
        .role { font-size: 1rem; color: #eee; margin-bottom: 15px; }
        .tags { display: flex; gap: 8px; flex-wrap: wrap; }
        .tag { 
            background: rgba(255,255,255,0.1); 
            padding: 4px 10px; 
            border-radius: 50px; 
            font-size: 0.75rem; 
            border: 1px solid rgba(255,255,255,0.1);
        }

        #cursor {
            width: 30px; height: 30px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.15s ease-out;
            display: none;
        }

        @media (hover: hover) and (pointer: fine) {
            #cursor { display: block; }
        }
    </style>
</head>
<body>
    <a href="board.html" class="back-to-board">
        <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        자유게시판
    </a>

    <div id="cursor"></div>
    <div class="glow-effect"></div>

    <header>
        <div class="header-title" data-aos="zoom-out" data-aos-duration="1500">JOY OON</div>
        <div class="header-sub" data-aos="fade-up" data-aos-delay="500">ACTOR FILMOGRAPHY</div>
    </header>

    <main class="content-wrapper">
        <section class="section-header" data-aos="fade-right">
            <h2>Works</h2>
            <div class="line"></div>
        </section>

        <div class="filmo-grid">
            <div class="work-card" data-aos="fade-up">
                <div class="work-img-wrap">
                    <img src="images/poster2025.jpg" alt="원수를 모시게 되었습니다" class="work-img">
                </div>
                <div class="work-overlay">
                    <div class="year">2025</div>
                    <h3 class="title">원수를 모시게 되었습니다</h3>
                    <div class="role">주연 | 캐릭터 이수지 역</div>
                    <div class="tags">
                        <span class="tag">#GL</span>
                        <span class="tag">#첫사랑</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 800,
            once: true,
            disable: 'mobile' 
        });

        const cursor = document.getElementById('cursor');
        if (window.matchMedia("(hover: hover)").matches) {
            document.addEventListener('mousemove', (e) => {
                cursor.style.transform = `translate(${e.clientX - 15}px, ${e.clientY - 15}px)`;
            });

            document.querySelectorAll('.work-card, .back-to-board').forEach(card => {
                card.addEventListener('mouseenter', () => {
                    cursor.style.transform += ' scale(2.5)';
                    cursor.style.backgroundColor = 'rgba(214, 51, 132, 0.1)';
                });
                card.addEventListener('mouseleave', () => {
                    cursor.style.scale = '1';
                    cursor.style.backgroundColor = 'transparent';
                });
            });
        }
    </script>
</body>
</html>
