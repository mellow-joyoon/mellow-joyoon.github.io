<!DOCTYPE html>
<html lang="ko">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>조윤 FILMOGRAPHY</title>
    <style>
        /* [기존 디자인 레이아웃] */
        body { 
            font-family: 'Apple SD Gothic Neo', sans-serif; 
            text-align: center; 
            background: #eef2f6; 
            margin: 0; padding: 0; min-height: 100vh; /* height 대신 min-height로 변경하여 모바일 스크롤 대응 */
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            overflow-x: hidden; /* 가로 스크롤 방지 */
        }

        .bgm-player { 
            position: fixed; top: 30px; left: 30px; z-index: 10001; 
            display: flex; align-items: center; gap: 15px; padding: 10px 20px; 
            background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(15px); 
            border-radius: 100px; border: 1px solid rgba(255, 255, 255, 0.6); 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02); 
        }
        .visualizer { display: flex; align-items: center; gap: 3px; height: 12px; cursor: pointer; }
        .bar { width: 2px; height: 100%; background: #8ea8c9; border-radius: 2px; transition: 0.3s; }
        .playing .bar { animation: wave 1s ease-in-out infinite; }
        @keyframes wave { 0%, 100% { height: 4px; } 50% { height: 12px; } }
        .control-group { display: flex; align-items: center; gap: 12px; border-left: 1px solid rgba(142, 168, 201, 0.2); padding-left: 12px; }
        .btn-icon { cursor: pointer; color: #8ea8c9; font-size: 14px; opacity: 0.8; }

        .fixed-btn { 
            position: fixed; left: 30px; width: 45px; height: 45px; 
            background: rgba(255, 255, 255, 0.8); border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; font-size: 1.1rem; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); z-index: 9999; text-decoration: none; 
        }

        .header-title { 
            font-size: 1.4rem; font-weight: 300; color: #555; 
            margin-bottom: 70px; letter-spacing: 10px; text-transform: uppercase; 
        }

        .work-grid { display: flex; justify-content: center; gap: 70px; width: 100%; }
        .work-item { cursor: pointer; transition: 0.5s; width: 120px; text-decoration: none; }
        
        .work-icon { 
            width: 90px; height: 90px; 
            background: linear-gradient(135deg, #fff 0%, #f0f4f8 100%); 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 20px 20px 60px #d1d9e6, -20px -20px 60px #ffffff; 
            margin: 0 auto 25px; border: 1px solid rgba(255,255,255,0.8); 
            transition: 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden; position: relative;
        }

        .icon-shape { 
            width: 30px; height: 30px; background: #8ea8c9; border-radius: 8px; 
            transform: rotate(45deg); opacity: 0.6; transition: 0.5s;
        }

        .work-title { 
            font-size: 0.75rem; font-weight: 700; color: #888; 
            letter-spacing: 2px; transition: 0.3s;
        }

        .work-item:hover .work-icon { transform: translateY(-15px); background: #8ea8c9; }
        .work-item:hover .icon-shape { background: white; transform: rotate(135deg); opacity: 1; }
        .work-item:hover .work-title { color: #333; letter-spacing: 4px; }

        .back-link { position: absolute; bottom: 50px; text-decoration: none; color: #ccc; font-size: 0.7rem; letter-spacing: 3px; }

        /* 2. 모바일 전용 반응형 디자인 추가 */
        @media (max-width: 768px) {
            body { overflow: auto; padding-top: 100px; padding-bottom: 80px; }
            .bgm-player { top: 15px; left: 15px; transform: scale(0.9); transform-origin: left top; }
            .fixed-btn { left: auto; right: 15px; width: 40px; height: 40px; } /* 버튼을 오른쪽으로 배치해 조작 편의성 증대 */
            .fixed-btn[style*="top: 85px;"] { top: 15px !important; }
            .fixed-btn[style*="top: 140px;"] { top: 65px !important; }
            
            .header-title { font-size: 1.1rem; letter-spacing: 6px; margin-bottom: 50px; margin-top: 40px; }
            .work-grid { flex-direction: column; align-items: center; gap: 40px; } /* 가로에서 세로로 변경 */
            .work-icon { width: 80px; height: 80px; }
            .back-link { position: relative; bottom: auto; margin-top: 60px; display: block; }
        }
    </style>
</head>
<body>
    <div class="bgm-player">
        <div class="visualizer" id="visualizer" onclick="toggleMusic()">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
        <div class="control-group">
            <div class="track-num" id="track-info" style="font-size: 10px; color: #8ea8c9; font-weight: 800;">01</div>
            <div class="btn-icon" onclick="nextMusic()" style="margin-left: 10px;">→</div>
        </div>
        <audio id="main-bgm" onended="nextMusic()"><source id="audio-source" src="bgm1.mp3" type="audio/mpeg"></audio>
    </div>

    <a href="index.html" class="fixed-btn" style="top: 85px;">🏠</a>
    <a href="guestbook.html" class="fixed-btn" style="top: 140px;">💬</a>

    <div class="header-title">JO YOON</div>

    <div class="work-grid">
        <a href="joyoon-onoff3.html" class="work-item">
            <div class="work-icon"><div class="icon-shape"></div></div>
            <div class="work-title">ONnOFF 3</div>
        </a>
        <a href="#" class="work-item">
            <div class="work-icon"><div class="icon-shape" style="border-radius: 50%;"></div></div>
            <div class="work-title">FILM NO.2</div>
        </a>
    </div>

    <a href="menu.html" class="back-link">← SELECT ACTOR</a>

    <script>
        const playlist = ["bgm1.mp3", "bgm2.mp3", "bgm3.mp3"]; let currentTrack = 0;
        const music = document.getElementById('main-bgm'); const source = document.getElementById('audio-source');
        const trackInfo = document.getElementById('track-info'); const visualizer = document.getElementById('visualizer');
        function toggleMusic() { if (music.paused) { music.play(); visualizer.classList.add('playing'); } else { music.pause(); visualizer.classList.remove('playing'); } }
        function nextMusic() { currentTrack = (currentTrack + 1) % playlist.length; source.src = playlist[currentTrack]; music.load(); music.play(); trackInfo.innerText = (currentTrack + 1).toString().padStart(2, '0'); visualizer.classList.add('playing'); }
    </script>
</body>

</html>
